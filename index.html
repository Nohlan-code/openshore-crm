<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Openshore — Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08090C;--surface:#0E1117;--card:#13171F;--border:#1E2430;
  --accent:#F0A500;--adim:rgba(240,165,0,.1);
  --green:#3FB950;--red:#F85149;--blue:#58A6FF;--purple:#BC8CFF;--wa:#25D366;
  --text:#E6EDF3;--muted:#7D8590;--dim:#21262D;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;font-size:14px}
*{box-sizing:border-box}
button,input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}

/* ── SCROLLBAR ── */
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* ══ AUTH ══════════════════════════════════════════════════════ */
#auth{
  position:fixed;inset:0;z-index:999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:20px;
}
#auth.hidden{display:none}
.auth-box{width:100%;max-width:380px}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo-icon{
  width:68px;height:68px;background:var(--accent);border-radius:20px;
  margin:0 auto 14px;display:flex;align-items:center;justify-content:center;
  font-size:32px;box-shadow:0 0 50px rgba(240,165,0,.4);
}
.auth-logo h1{font-size:28px;font-weight:900;letter-spacing:-0.5px}
.auth-logo p{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-top:5px}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:26px;margin-bottom:12px}
.auth-card h2{font-size:18px;font-weight:800;margin-bottom:4px}
.auth-card .sub{color:var(--muted);font-size:12px;margin-bottom:22px}
.auth-fields{display:flex;flex-direction:column;gap:13px}

/* ══ APP SHELL ═════════════════════════════════════════════════ */
#app{display:none;height:100vh;overflow:hidden}
#app.visible{display:flex}

/* DESKTOP: sidebar + content */
@media(min-width:900px){
  #app{flex-direction:row}
  #sidebar{display:flex!important;flex-direction:column;width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--border);height:100vh;flex-shrink:0}
  #topbar{display:none!important}
  #bottomnav{display:none!important}
  #content{flex:1;overflow-y:auto;height:100vh}
  #page{padding:28px 32px 40px;max-width:820px;margin:0 auto}
}

/* TABLET: topbar + content + bottomnav */
@media(min-width:600px) and (max-width:899px){
  #app{flex-direction:column}
  #sidebar{display:none!important}
  #topbar{display:flex!important}
  #bottomnav{display:flex!important}
  #content{flex:1;overflow-y:auto}
  #page{padding:20px 20px 90px;max-width:700px;margin:0 auto}
}

/* MOBILE: topbar + content + bottomnav */
@media(max-width:599px){
  #app{flex-direction:column}
  #sidebar{display:none!important}
  #topbar{display:flex!important}
  #bottomnav{display:flex!important}
  #content{flex:1;overflow-y:auto}
  #page{padding:14px 14px 90px}
}

/* ── SIDEBAR ── */
#sidebar{display:none}
.sb-logo{padding:20px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-logo h1{font-size:14px;font-weight:900;line-height:1.1}
.sb-logo p{font-size:8px;color:var(--accent);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.sb-nav{padding:10px 8px;flex:1;overflow-y:auto}
.sb-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  padding:9px 12px;border:none;background:transparent;border-radius:10px;
  color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;
  transition:all .15s;margin-bottom:2px;text-align:left;
}
.sb-btn:hover{background:var(--card);color:var(--text)}
.sb-btn.active{background:var(--adim);color:var(--accent);font-weight:800}
.sb-btn .si{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:900}
.sb-footer{padding:12px 8px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:8px}
.sb-langs{display:flex;gap:5px;padding:0 4px;margin-bottom:6px}

/* ── TOPBAR ── */
#topbar{
  display:none;
  align-items:center;justify-content:space-between;
  padding:0 14px;height:52px;flex-shrink:0;
  background:rgba(14,17,23,.95);backdrop-filter:blur(16px);
  border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;
}
.tb-logo{display:flex;align-items:center;gap:8px}
.tb-logo-icon{width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px}
.tb-logo h1{font-size:13px;font-weight:900;line-height:1}
.tb-logo p{font-size:8px;color:var(--accent);font-weight:700;letter-spacing:1.5px;text-transform:uppercase}
.tb-right{display:flex;align-items:center;gap:7px}

/* ── BOTTOM NAV ── */
#bottomnav{
  display:none;
  position:fixed;bottom:0;left:0;right:0;z-index:10;
  background:rgba(14,17,23,.97);backdrop-filter:blur(20px);
  border-top:1px solid var(--border);
  padding-bottom:env(safe-area-inset-bottom,0px);
}
.bn-btn{
  flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:3px;padding:8px 4px;border:none;background:transparent;
  border-top:2px solid transparent;cursor:pointer;transition:all .15s;
}
.bn-btn.active{background:var(--adim);border-top-color:var(--accent)}
.bn-icon{font-size:20px;position:relative}
.bn-badge{
  position:absolute;top:-4px;right:-8px;
  background:var(--red);color:#fff;border-radius:10px;
  width:15px;height:15px;display:flex;align-items:center;justify-content:center;
  font-size:8px;font-weight:900;
}
.bn-label{font-size:9px;font-weight:700;color:var(--muted);letter-spacing:.4px;text-transform:uppercase}
.bn-btn.active .bn-label{color:var(--accent)}

/* ══ COMPONENTS ════════════════════════════════════════════════ */

/* Buttons */
.btn{border-radius:9px;font-weight:700;letter-spacing:.3px;white-space:nowrap;cursor:pointer;border:none;transition:opacity .15s;font-size:13px;padding:10px 18px;display:inline-flex;align-items:center;gap:6px}
.btn:hover{opacity:.82}
.btn:active{opacity:.65}
.btn-sm{font-size:11px;padding:5px 11px;border-radius:7px}
.btn-full{width:100%;justify-content:center}
.btn-p{background:var(--accent);color:#000}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)!important}
.btn-blue{background:rgba(88,166,255,.12);color:var(--blue);border:1px solid rgba(88,166,255,.3)!important}
.btn-green{background:rgba(63,185,80,.12);color:var(--green);border:1px solid rgba(63,185,80,.3)!important}
.btn-red{background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.3)!important}
.btn-wa{background:rgba(37,211,102,.12);color:var(--wa);border:1px solid rgba(37,211,102,.3)!important}
.btn-purple{background:rgba(188,140,255,.12);color:var(--purple);border:1px solid rgba(188,140,255,.3)!important}

/* Inputs */
.field{display:flex;flex-direction:column;gap:5px}
.lbl{color:var(--muted);font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase}
.inp{background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 12px;font-size:13px;outline:none;width:100%;transition:border-color .2s}
.inp:focus{border-color:var(--accent)}
textarea.inp{resize:vertical;min-height:80px}
select.inp{cursor:pointer}

/* Cards */
.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.card-h{padding:13px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-b{padding:14px 16px}
.card-f{padding:10px 14px 13px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap}

/* Badges */
.badge{border-radius:6px;padding:3px 9px;font-size:10px;font-weight:700}
.pill{border-radius:20px;padding:2px 9px;font-size:10px;font-weight:700}

/* Avatar */
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;flex-shrink:0;background:linear-gradient(135deg,rgba(240,165,0,.8),rgba(188,140,255,.8));border:2px solid rgba(240,165,0,.2)}

/* Alerts */
.alert{border-radius:8px;padding:9px 13px;font-size:12px;font-weight:700}
.alert-e{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--red)}
.alert-s{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--green)}
.alert-i{background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.3);color:var(--blue)}
.alert-w{background:rgba(240,165,0,.1);border:1px solid rgba(240,165,0,.3);color:var(--accent)}

/* Stats */
.stats-grid{display:grid;gap:10px;margin-bottom:16px}
@media(min-width:600px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:599px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 12px;position:relative;overflow:hidden}
.stat-ico{position:absolute;top:8px;right:10px;font-size:20px;opacity:.1}
.stat-val{font-size:26px;font-weight:900;line-height:1}
.stat-lbl{color:var(--muted);font-size:10px;margin-top:4px;font-weight:700}

/* Tools */
.tools-grid{display:grid;gap:10px}
@media(min-width:700px){.tools-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:500px) and (max-width:699px){.tools-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:499px){.tools-grid{grid-template-columns:1fr 1fr}}
.tool-card{display:flex;align-items:center;gap:10px;padding:13px;background:var(--card);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .15s}
.tool-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.tool-ico{width:36px;height:36px;background:var(--adim);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

/* Filters */
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;margin-bottom:12px}
.filters::-webkit-scrollbar{display:none}
.fbtn{background:var(--card);color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0;cursor:pointer;transition:all .15s}
.fbtn.active{background:var(--accent);color:#000;border-color:var(--accent)}

/* Two col grid */
.two-col{display:grid;gap:10px}
@media(min-width:480px){.two-col{grid-template-columns:1fr 1fr}}

/* Sheet */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadein .2s}
@media(min-width:600px){.overlay{align-items:center}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.sheet{background:var(--card);border:1px solid var(--border);width:100%;max-width:520px;max-height:92vh;overflow-y:auto;box-shadow:0 -20px 60px rgba(0,0,0,.8);animation:slideup .25s ease;border-radius:20px 20px 0 0}
@media(min-width:600px){.sheet{border-radius:20px;margin:20px}}
@keyframes slideup{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.sheet-handle{display:flex;justify-content:center;padding:12px 0 0}
.sheet-handle-bar{width:40px;height:4px;background:var(--border);border-radius:2px}
@media(min-width:600px){.sheet-handle{display:none}}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 0}
.sheet-body{padding:16px 20px 36px;display:flex;flex-direction:column;gap:12px}
.sheet-x{background:none;border:none;color:var(--muted);font-size:26px;line-height:1;cursor:pointer;padding:4px}

/* Modal */
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.9)}

/* Section title */
.section-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 10px}

/* Sync */
.sdot{width:8px;height:8px;border-radius:50%;display:inline-block;flex-shrink:0}
.sdot-ok{background:var(--green);box-shadow:0 0 6px var(--green)}
.sdot-sync{background:var(--accent);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* Page animation */
.screen{animation:pagein .18s ease}
@keyframes pagein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
</style>
</head>
<body>

<!-- ══ AUTH ════════════════════════════════════════════════════════ -->
<div id="auth">
  <div style="position:absolute;top:16px;right:16px;display:flex;gap:5px">
    <button class="btn btn-sm btn-p" id="al-fr" onclick="setLang('fr')">FR</button>
    <button class="btn btn-sm btn-ghost" id="al-en" onclick="setLang('en')">EN</button>
  </div>
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-icon">⚡</div>
      <h1>Openshore</h1>
      <p>Workspace</p>
    </div>
    <div class="auth-card">
      <h2 id="a-title"></h2>
      <div class="sub" id="a-sub"></div>
      <div class="auth-fields">
        <div class="field"><label class="lbl" id="a-el"></label><input id="a-email" class="inp" type="email" placeholder="votre@email.com" onkeydown="if(event.key==='Enter')tryLogin()"/></div>
        <div class="field"><label class="lbl" id="a-pl"></label>
          <div style="position:relative">
            <input id="a-pw" class="inp" type="password" placeholder="••••••••" style="padding-right:44px" onkeydown="if(event.key==='Enter')tryLogin()"/>
            <button onclick="togglePw('a-pw',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:15px;color:var(--muted);cursor:pointer">👁</button>
          </div>
        </div>
        <div id="a-err" class="alert alert-e" style="display:none"></div>
        <button class="btn btn-p btn-full" id="a-btn" onclick="tryLogin()"></button>
      </div>
    </div>
    <button onclick="openAdminModal()" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--muted);padding:12px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:border-color .15s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">🔐 <span id="a-admin-lbl"></span></button>
  </div>
</div>

<!-- ══ ADMIN MODAL ══════════════════════════════════════════════════ -->
<div id="admin-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:36px;margin-bottom:8px">🔐</div>
      <h3 id="am-title" style="font-size:17px;font-weight:800"></h3>
      <p id="am-sub" style="color:var(--muted);font-size:12px;margin-top:5px"></p>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div style="position:relative">
        <input id="am-pw" class="inp" type="password" placeholder="••••••••" style="padding-right:44px" onkeydown="if(event.key==='Enter')tryAdmin()"/>
        <button onclick="togglePw('am-pw',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:15px;color:var(--muted);cursor:pointer">👁</button>
      </div>
      <div id="am-err" class="alert alert-e" style="display:none"></div>
      <button class="btn btn-p btn-full" onclick="tryAdmin()" id="am-btn"></button>
      <button class="btn btn-ghost btn-full" onclick="el('admin-modal').style.display='none'" id="am-cancel"></button>
    </div>
  </div>
</div>

<!-- ══ APP ══════════════════════════════════════════════════════════ -->
<div id="app">
  <!-- SIDEBAR -->
  <nav id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">⚡</div>
      <div><h1>Openshore</h1><p>Workspace</p></div>
    </div>
    <div class="sb-nav" id="sb-nav"></div>
    <div class="sb-footer">
      <div class="sb-user" id="sb-user"></div>
      <div class="sb-langs">
        <button class="btn btn-sm btn-p" id="sl-fr" onclick="setLang('fr')">FR</button>
        <button class="btn btn-sm btn-ghost" id="sl-en" onclick="setLang('en')">EN</button>
      </div>
      <button class="btn btn-ghost btn-full btn-sm" onclick="logout()">⎋ <span id="sb-logout"></span></button>
    </div>
  </nav>

  <!-- CONTENT -->
  <div id="content">
    <!-- TOPBAR -->
    <div id="topbar">
      <div class="tb-logo">
        <div class="tb-logo-icon">⚡</div>
        <div><h1 class="tb-logo">Openshore</h1><p class="tb-logo">Workspace</p></div>
      </div>
      <div class="tb-right">
        <button class="btn btn-sm btn-p" id="tl-fr" onclick="setLang('fr')">FR</button>
        <button class="btn btn-sm btn-ghost" id="tl-en" onclick="setLang('en')">EN</button>
        <span id="tb-role"></span>
        <button onclick="logout()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px">⎋</button>
      </div>
    </div>

    <!-- PAGE -->
    <div id="page"></div>
  </div>

  <!-- BOTTOM NAV -->
  <nav id="bottomnav" id="bn"></nav>
</div>

<!-- SHEET -->
<div id="sheet-wrap"></div>

<script>

const el=id=>document.getElementById(id);
function uid(){return Math.random().toString(36).slice(2,9)}
function nowISO(){return new Date().toISOString()}
function d7(){return new Date(Date.now()+7*864e5).toISOString().slice(0,10)}
function fmt(iso){return iso?new Date(iso).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"}):"—"}
function showErr(id,msg){const e=el(id);e.textContent=msg;e.style.display="block";setTimeout(()=>e.style.display="none",3000)}
function togglePw(id,btn){const i=el(id);i.type=i.type==="password"?"text":"password";btn.textContent=i.type==="password"?"👁":"🙈"}

function mkAv(ini,sz=36){return`<div class="av" style="width:${sz}px;height:${sz}px;font-size:${sz*.33}px">${ini}</div>`}
function mkBadge(sk){const c=STATUS_COLORS[sk]||"#58A6FF";return`<span class="badge" style="background:${c}20;color:${c};border:1px solid ${c}40">${t().sl[sk]||sk}</span>`}
function mkPill(lbl,c="#F0A500"){return`<span class="pill" style="background:${c}18;color:${c};border:1px solid ${c}33">${lbl}</span>`}
function flName(id){const f=S.freelancers.find(x=>x.id===id);return f?f.name:"—"}
function daysLeft(iso){if(!iso)return null;return Math.ceil((new Date(iso)-Date.now())/864e5)}
function deadlineHtml(iso){
  if(!iso)return"";
  const d=daysLeft(iso);
  const c=d<=0?"var(--red)":d<=2?"var(--accent)":"var(--muted)";
  const lbl=d<=0?"Dépassé":`J-${d}`;
  return`<div style="display:flex;align-items:center;gap:5px;font-size:11px;color:${c};font-weight:${d<=2?"700":"400"}">⏱ Deadline : ${fmt(iso)} (${lbl})</div>`;
}

function setLang(l){
  S.lang=l;
  // Update all lang buttons
  ["al","sl","tl"].forEach(p=>{
    const fr=el(`${p}-fr`),en=el(`${p}-en`);
    if(!fr||!en)return;
    if(l==="fr"){fr.className="btn btn-sm btn-p";en.className="btn btn-sm btn-ghost";}
    else{en.className="btn btn-sm btn-p";fr.className="btn btn-sm btn-ghost";}
  });
  updateAuthUI();
  if(S.role)renderApp();
}

function updateAuthUI(){
  const tr=t();
  el("a-title").textContent=tr.login;
  el("a-sub").textContent=tr.loginSub;
  el("a-el").textContent=tr.emailL;
  el("a-pl").textContent=tr.pwL;
  el("a-btn").textContent=tr.loginBtn;
  el("a-admin-lbl").textContent=tr.adminBtn;
  el("am-title").textContent=tr.adminTitle;
  el("am-sub").textContent=tr.adminSub;
  el("am-btn").textContent=tr.loginBtn;
  el("am-cancel").textContent=tr.cancel;
}

function tryLogin(){
  const email=el("a-email").value.trim().toLowerCase();
  const pw=el("a-pw").value;
  const fl=S.freelancers.find(f=>f.email.toLowerCase()===email&&f.password===pw&&f.active);
  if(fl){doLogin("freelancer",fl);}
  else{showErr("a-err",t().wrongPw);}
}
function openAdminModal(){el("admin-modal").style.display="flex";el("am-pw").value="";}
function tryAdmin(){
  if(el("am-pw").value===ADMIN_PW){el("admin-modal").style.display="none";doLogin("admin",null);}
  else{showErr("am-err",t().wrongAdmin);}
}
function doLogin(role,me){
  S.role=role;S.me=me;S.tab="dashboard";
  el("auth").classList.add("hidden");
  el("app").classList.add("visible");
  buildNav();renderPage();
  if(role==="admin")syncOrders();
}
function logout(){
  S.role=null;S.me=null;
  if(syncTimer)clearInterval(syncTimer);
  el("app").classList.remove("visible");
  el("auth").classList.remove("hidden");
  el("a-email").value="";el("a-pw").value="";
}

// NAV
// ════════════════════════════════════════
const ADM_TABS=[{k:"dashboard",i:"📊"},{k:"orders",i:"📋"},{k:"freelancers",i:"👥"},{k:"tools",i:"🧰"},{k:"typeform",i:"🔗"}];
const FL_TABS =[{k:"dashboard",i:"📊"},{k:"orders",i:"📋"},{k:"tools",i:"🧰"}];

function buildNav(){
  const tabs=S.role==="admin"?ADM_TABS:FL_TABS;
  const newCnt=S.orders.filter(o=>o.status==="new").length;
  const tr=t();

  // Sidebar
  el("sb-nav").innerHTML=tabs.map(tb=>`
    <button class="sb-btn${S.tab===tb.k?" active":""}" onclick="goTab('${tb.k}')">
      <span class="si">${tb.i}</span>${tr[tb.k]}
      ${tb.k==="orders"&&S.role==="admin"&&newCnt>0?`<span class="sb-badge">${newCnt}</span>`:""}
    </button>`).join("");

  el("sb-logout").textContent=tr.logout;
  const me=S.me;
  el("sb-user").innerHTML=me
    ?`${mkAv(me.avatar,32)}<div><div style="font-size:12px;font-weight:700">${me.name}</div><div style="font-size:10px;color:var(--muted)">${me.specialty}</div></div>`
    :`<div style="font-weight:800;color:var(--accent)">⚡ Admin</div>`;

  // Topbar role
  el("tb-role").innerHTML=mkPill(S.role==="admin"?tr.admin:(me?me.name.split(" ")[0]:tr.freelancer),S.role==="admin"?"#F0A500":"#BC8CFF");

  // Bottom nav
  el("bottomnav").innerHTML=tabs.map(tb=>`
    <button class="bn-btn${S.tab===tb.k?" active":""}" onclick="goTab('${tb.k}')">
      <div class="bn-icon">${tb.i}${tb.k==="orders"&&S.role==="admin"&&newCnt>0?`<div class="bn-badge">${newCnt}</div>`:""}</div>
      <span class="bn-label">${tr[tb.k]}</span>
    </button>`).join("");
}

function goTab(k){
  S.tab=k;buildNav();renderPage();
  el("content").scrollTo(0,0);
}

function renderApp(){buildNav();renderPage();}
function renderPage(){

// DASHBOARD
// ════════════════════════════════════════
function renderDash(){
  const tr=t();
  const my=S.role==="freelancer"?S.orders.filter(o=>o.freelanceId===S.me?.id):S.orders;
  const stats=S.role==="admin"?[
    {l:tr.totalOrders,v:S.orders.length,c:"var(--blue)",i:"📋"},
    {l:tr.inProgress,v:S.orders.filter(o=>o.status==="inprogress").length,c:"var(--accent)",i:"⚡"},
    {l:tr.delivered,v:S.orders.filter(o=>o.status==="delivered").length,c:"var(--green)",i:"✅"},
    {l:tr.activeFl,v:S.freelancers.filter(f=>f.active).length,c:"var(--purple)",i:"👥"},
  ]:[
    {l:tr.totalOrders,v:my.length,c:"var(--blue)",i:"📋"},
    {l:tr.inProgress,v:my.filter(o=>o.status==="inprogress").length,c:"var(--accent)",i:"⚡"},
    {l:tr.delivered,v:my.filter(o=>o.status==="delivered").length,c:"var(--green)",i:"✅"},
  ];
  const recent=[...my].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,5);

  let h=`<div class="screen">`;
  if(S.me){h+=`<div style="background:linear-gradient(135deg,rgba(240,165,0,.08),rgba(188,140,255,.08));border:1px solid rgba(240,165,0,.18);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:16px">${mkAv(S.me.avatar,42)}<div><div style="font-weight:800;font-size:14px">👋 ${S.me.name}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${S.me.specialty}</div></div></div>`;}

  h+=`<div class="stats-grid">${stats.map(s=>`<div class="stat"><div class="stat-ico">${s.i}</div><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join("")}</div>`;

  h+=`<div class="card" style="margin-bottom:14px"><div class="card-h"><span style="font-size:13px;font-weight:800">${tr.recentOrders}</span></div>`;
  if(!recent.length)h+=`<div style="padding:24px;text-align:center;color:var(--muted);font-size:13px">${tr.noOrders}</div>`;
  recent.forEach(o=>{
    h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:11px 16px;border-bottom:1px solid var(--border);gap:8px">
      <div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.clientName}</div>
      <div style="font-size:10px;color:var(--muted)">${o.projectType||""} · ${fmt(o.createdAt)}</div></div>
      ${mkBadge(o.status)}</div>`;
  });
  h+=`</div>`;

  if(S.role==="admin"){
    h+=`<div class="card"><div class="card-h"><span style="font-size:13px;font-weight:800">${tr.flLoad}</span></div>`;
    S.freelancers.filter(f=>f.active).forEach(f=>{
      const cnt=S.orders.filter(o=>o.freelanceId===f.id&&!["delivered","cancelled"].includes(o.status)).length;
      h+=`<div style="display:flex;align-items:center;gap:12px;padding:11px 16px;border-bottom:1px solid var(--border)">
        ${mkAv(f.avatar,30)}<div style="flex:1"><div style="font-size:12px;font-weight:700">${f.name}</div><div style="font-size:10px;color:var(--muted)">${f.specialty}</div></div>
        <div style="background:${cnt>2?"rgba(248,81,73,.12)":cnt>0?"rgba(240,165,0,.12)":"var(--dim)"};color:${cnt>2?"var(--red)":cnt>0?"var(--accent)":"var(--muted)"};border-radius:20px;padding:2px 10px;font-size:11px;font-weight:800">${cnt} projet${cnt!==1?"s":""}</div>
      </div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;
  el("page").innerHTML=h;
}

// ════════════════════════════════════════
function renderOrders(){
  const tr=t();
  const pool=S.role==="freelancer"?S.orders.filter(o=>o.freelanceId===S.me?.id):S.orders;
  const list=pool.filter(o=>{
    if(S.oFilter!=="all"&&o.status!==S.oFilter)return false;
    if(S.oSearch&&!o.clientName.toLowerCase().includes(S.oSearch.toLowerCase()))return false;
    return true;
  });

  let h=`<div class="screen">`;
  if(S.role==="freelancer")h+=`<div class="alert alert-i" style="margin-bottom:12px">ℹ️ ${tr.myOnly}</div>`;

  h+=`<div style="display:flex;gap:8px;margin-bottom:10px">
    <input class="inp" style="flex:1" placeholder="${tr.search}" value="${S.oSearch}" oninput="S.oSearch=this.value;renderOrders()"/>
    ${S.role==="admin"?`<button class="btn btn-p" onclick="openOrderSheet(null)" style="flex-shrink:0;white-space:nowrap">${tr.addOrder}</button>`:""}
  </div>
  <div class="filters">${["all",...Object.keys(tr.sl)].map(s=>`<button class="fbtn${S.oFilter===s?" active":""}" onclick="S.oFilter='${s}';renderOrders()">${s==="all"?tr.all:tr.sl[s]}</button>`).join("")}</div>`;

  if(!list.length)h+=`<div class="card"><div style="padding:32px;text-align:center;color:var(--muted);font-size:13px">${S.role==="freelancer"?tr.noMissions:tr.noOrders}</div></div>`;

  list.forEach(o=>{
    const fl=S.freelancers.find(f=>f.id===o.freelanceId);
    h+=`<div class="card" style="margin-bottom:10px">
      <div class="card-h">
        <div style="flex:1;min-width:0">
          <div style="font-weight:800;font-size:14px">${o.clientName}</div>
          ${o.company?`<div style="font-size:10px;color:var(--accent);font-weight:700;margin-top:1px">${o.company}</div>`:""}
          <div style="font-size:10px;color:var(--muted);margin-top:1px">${[o.clientEmail,o.clientPhone].filter(Boolean).join(" · ")}</div>
        </div>
        <div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
          ${o.source==="typeform"?mkPill("TF","#58A6FF"):""}
          ${o.budget?`<span style="font-weight:900;color:var(--accent);font-size:13px">${o.budget}</span>`:""}
        </div>
      </div>
      <div class="card-b">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
          <span style="font-size:11px;color:var(--muted);background:var(--dim);border-radius:5px;padding:2px 8px">${o.projectType||""}</span>
          ${S.role==="admin"
            ?`<select class="inp" style="width:auto;font-size:10px;padding:4px 8px;color:${STATUS_COLORS[o.status]}" onchange="chgStatus('${o.id}',this.value)">${Object.entries(tr.sl).map(([k,v])=>`<option value="${k}"${k===o.status?" selected":""}>${v}</option>`).join("")}</select>`
            :mkBadge(o.status)}
        </div>
        ${o.description?`<p style="font-size:11px;color:var(--muted);margin-bottom:7px;line-height:1.5">${o.description.slice(0,120)}${o.description.length>120?"…":""}</p>`:""}
        ${o.landingObjective?`<div style="font-size:11px;margin-bottom:4px;display:flex;gap:5px;align-items:center">🎯 <span style="color:var(--text);font-weight:600">${o.landingObjective}</span></div>`:""}
        ${o.colors?`<div style="font-size:10px;color:var(--muted);margin-bottom:4px">🎨 ${o.colors}</div>`:""}
        ${o.inspiration?`<div style="font-size:10px;margin-bottom:4px">🔗 <a href="${o.inspiration}" target="_blank" style="color:var(--blue)">${o.inspiration.slice(0,45)}${o.inspiration.length>45?"…":""}</a></div>`:""}
        ${o.assets?`<div style="font-size:10px;margin-bottom:7px">📁 <a href="${o.assets}" target="_blank" style="color:var(--purple)">${o.assets.slice(0,45)}${o.assets.length>45?"…":""}</a></div>`:""}
        ${deadlineHtml(o.deadline)}
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:7px">
          ${fl?`<div style="display:flex;align-items:center;gap:6px">${mkAv(fl.avatar,22)}<span style="font-size:11px;font-weight:600">${fl.name}</span></div>`:`<span style="font-size:11px;color:var(--muted);font-style:italic">Non assigné</span>`}
          <span style="font-size:10px;color:var(--muted)">${fmt(o.createdAt)}</span>
        </div>
      </div>
      ${S.role==="admin"?`<div class="card-f">
        <button class="btn btn-sm btn-blue" onclick="openAssign('${o.id}')">👤 ${tr.assign}</button>
        ${fl&&fl.phone?`<button class="btn btn-sm btn-wa" onclick="sendWA('${o.id}')">📲 WA</button>`:""}

        <button class="btn btn-sm btn-red" onclick="delOrder('${o.id}')">🗑️</button>
      </div>`:""}

  h+=`</div>`;
  el("page").innerHTML=h;

function chgStatus(id,s){S.orders=S.orders.map(o=>o.id===id?{...o,status:s}:o);save();renderOrders();buildNav();}
function delOrder(id){if(!confirm("Supprimer cette commande ?"))return;S.orders=S.orders.filter(o=>o.id!==id);save();renderOrders();buildNav();}
function sendWA(oid){
  const o=S.orders.find(x=>x.id===oid);
  const fl=S.freelancers.find(f=>f.id===o?.freelanceId);
  if(!fl?.phone)return;
  const msg=t().wa(fl.name,o.clientName,o.projectType);
  window.open(`https://wa.me/${fl.phone.replace(/\D/g,"")}?text=${encodeURIComponent(msg)}`,"_blank");
}

    <div class="field"><label class="lbl">${tr.desc}</label><textarea class="inp" id="of-ds">${f.description}</textarea></div>
    <div class="two-col">
      <button class="btn btn-ghost btn-full" onclick="closeSheet()">${tr.cancel}</button>
      <button class="btn btn-p btn-full" onclick="saveOrder('${id||""}')">${o?tr.save:tr.create}</button>
    </div>`);
}
function saveOrder(id){
  const n=el("of-n").value.trim();if(!n)return;
  const form={clientName:n,clientEmail:el("of-e").value,projectType:el("of-t").value,
    budget:el("of-b").value,deadline:el("of-d").value||d7(),description:el("of-ds").value};
  if(id){S.orders=S.orders.map(o=>o.id===id?{...o,...form}:o);}
  else{S.orders=[{...form,id:uid(),status:"new",freelanceId:null,createdAt:nowISO(),source:"manual",typeformResponseId:null},...S.orders];}
  save();closeSheet();renderOrders();buildNav();
}

// ════════════════════════════════════════
// ASSIGN SHEET
// ════════════════════════════════════════
function openAssign(oid){
  const tr=t();
  const o=S.orders.find(x=>x.id===oid);
  let h=`<p style="color:var(--muted);font-size:12px;margin-bottom:12px">${tr.assignSub}</p>`;
  S.freelancers.filter(f=>f.active).forEach(f=>{
    const load=S.orders.filter(o=>o.freelanceId===f.id&&!["delivered","cancelled"].includes(o.status)).length;
    const sel=o?.freelanceId===f.id;
    h+=`<div onclick="doAssign('${oid}','${f.id}')" style="display:flex;align-items:center;gap:12px;padding:13px;background:${sel?"var(--adim)":"var(--bg)"};border:1px solid ${sel?"var(--accent)":"var(--border)"};border-radius:12px;margin-bottom:8px;cursor:pointer;transition:all .15s">
      ${mkAv(f.avatar)}<div style="flex:1">
        <div style="font-weight:700;font-size:13px">${f.name}</div>
        <div style="font-size:11px;color:var(--muted)">${f.specialty}</div>
        ${f.phone?`<div style="font-size:10px;color:var(--wa)">📲 ${f.phone}</div>`:""}
      </div>
      <div style="color:${load>2?"var(--red)":load>0?"var(--accent)":"var(--green)"};font-size:11px;font-weight:800">${load} proj.</div>
    </div>`;
  });
  if(o?.freelanceId)h+=`<button class="btn btn-red btn-full" onclick="doAssign('${oid}','')" style="margin-top:6px">${tr.unassign}</button>`;
  openSheet(`${tr.assignTo} — ${o?.clientName||""}`,h);
}
function doAssign(oid,fid){
  S.orders=S.orders.map(o=>o.id===oid?{...o,freelanceId:fid||null,status:fid?"assigned":"new"}:o);
  save();closeSheet();
  if(fid){
    const fl=S.freelancers.find(f=>f.id===fid);
    const o=S.orders.find(x=>x.id===oid);
    if(fl?.phone&&o){const msg=t().wa(fl.name,o.clientName,o.projectType);window.open(`https://wa.me/${fl.phone.replace(/\D/g,"")}?text=${encodeURIComponent(msg)}`,"_blank");}
  }
  renderOrders();buildNav();
}

// ════════════════════════════════════════
// FREELANCERS
// ════════════════════════════════════════
function renderFL(){
  const tr=t();
  let h=`<div class="screen"><div style="display:flex;justify-content:flex-end;margin-bottom:14px"><button class="btn btn-p" onclick="openFlSheet(null)">${tr.addFl}</button></div>`;
  S.freelancers.forEach(f=>{
    const act=S.orders.filter(o=>o.freelanceId===f.id&&!["delivered","cancelled"].includes(o.status)).length;
    const done=S.orders.filter(o=>o.freelanceId===f.id&&o.status==="delivered").length;
    h+=`<div class="card" style="margin-bottom:12px;opacity:${f.active?1:.5}">
      <div class="card-b">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:12px">
          ${mkAv(f.avatar,44)}<div style="flex:1;min-width:0">
            <div style="font-weight:800;font-size:14px">${f.name}</div>
            <div style="font-size:11px;color:var(--muted)">${f.email}</div>
            ${f.phone?`<div style="font-size:10px;color:var(--wa);margin-top:2px">📲 ${f.phone}</div>`:""}
          </div>
          ${mkPill(f.specialty,"#BC8CFF")}
        </div>
        <div class="two-col" style="margin-bottom:12px">
          <div style="background:var(--bg);border-radius:8px;padding:10px;text-align:center"><div style="font-size:22px;font-weight:900;color:var(--accent)">${act}</div><div style="font-size:10px;color:var(--muted)">${tr.inProgress}</div></div>
          <div style="background:var(--bg);border-radius:8px;padding:10px;text-align:center"><div style="font-size:22px;font-weight:900;color:var(--green)">${done}</div><div style="font-size:10px;color:var(--muted)">${tr.delivered}</div></div>
        </div>
        <div style="display:flex;gap:7px;flex-wrap:wrap">
          <button class="btn btn-sm btn-ghost" onclick="openFlSheet('${f.id}')">✏️ ${tr.edit}</button>
          <button class="btn btn-sm ${f.active?"btn-red":"btn-green"}" onclick="toggleFl('${f.id}')">${f.active?tr.deactivate:tr.reactivate}</button>
          <button class="btn btn-sm btn-red" onclick="delFl('${f.id}')">🗑️</button>
        </div>
      </div>
    </div>`;
  });
  h+=`</div>`;
  el("page").innerHTML=h;
}
function toggleFl(id){S.freelancers=S.freelancers.map(f=>f.id===id?{...f,active:!f.active}:f);save();renderFL();}
function delFl(id){if(!confirm("Supprimer ?"))return;S.freelancers=S.freelancers.filter(f=>f.id!==id);save();renderFL();}
function openFlSheet(id){
  const tr=t();const f=id?S.freelancers.find(x=>x.id===id):null;
  openSheet(f?tr.editFl:tr.newFl,`
    <div class="field"><label class="lbl">${tr.fullName}</label><input class="inp" id="ff-n" value="${f?.name||""}"/></div>
    <div class="field"><label class="lbl">${tr.email}</label><input class="inp" type="email" id="ff-e" value="${f?.email||""}"/></div>
    <div class="field"><label class="lbl">${tr.pwFl}</label><input class="inp" id="ff-p" value="${f?.password||""}"/></div>
    <div class="field"><label class="lbl">${tr.phone}</label><input class="inp" id="ff-ph" value="${f?.phone||""}" placeholder="+33 6 00 00 00 00"/></div>
    <select class="inp" id="ff-s">${tr.specs.map(x=>`<option${x===f?.specialty?" selected":""}>${x}</option>`).join("")}</select>
    <div class="two-col">
      <button class="btn btn-ghost btn-full" onclick="closeSheet()">${tr.cancel}</button>
      <button class="btn btn-p btn-full" onclick="saveFl('${id||""}')">${f?tr.save:tr.add}</button>
    </div>`);
}
function saveFl(id){
  const n=el("ff-n").value.trim();if(!n)return;
  const ini=n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const form={name:n,email:el("ff-e").value,password:el("ff-p").value,phone:el("ff-ph").value,specialty:el("ff-s").value,avatar:ini};
  if(id){S.freelancers=S.freelancers.map(f=>f.id===id?{...f,...form}:f);}
  else{S.freelancers=[...S.freelancers,{...form,id:uid(),active:true}];}
  save();closeSheet();renderFL();
}

function renderTools(){
  const tr=t();
  const cats=[...new Set(S.tools.map(x=>x.category))];
  let h=`<div class="screen">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
      <p style="color:var(--muted);font-size:12px">${tr.toolsLib}</p>
      ${S.role==="admin"?`<button class="btn btn-p btn-sm" onclick="openToolSheet()">${tr.addTool}</button>`:""}
    </div>`;
  cats.forEach(cat=>{
    h+=`<div class="section-title">${cat}</div><div class="tools-grid" style="margin-bottom:20px">`;
    S.tools.filter(x=>x.category===cat).forEach(tool=>{
      h+=`<a href="${tool.url}" target="_blank"><div class="tool-card">
        <div class="tool-ico">${tool.icon}</div>
        <div style="min-width:0"><div style="font-weight:700;font-size:12px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${tool.name}</div>
        <div style="font-size:10px;color:var(--muted);margin-top:2px;line-height:1.3">${tool.description}</div></div>

    h+=`</div>`;
  });
  h+=`</div>`;
  el("page").innerHTML=h;
}
function openToolSheet(){
  const tr=t();
  openSheet(tr.addTool,`
    <div class="two-col">
      <div class="field"><label class="lbl">${tr.icon}</label><input class="inp" id="tl-i" value="🔗"/></div>
      <div class="field"><label class="lbl">${tr.name}</label><input class="inp" id="tl-n"/></div>
    </div>
    <div class="field"><label class="lbl">${tr.url}</label><input class="inp" id="tl-u" placeholder="https://"/></div>
    <select class="inp" id="tl-c">${tr.cats.map(x=>`<option>${x}</option>`).join("")}</select>
    <div class="field"><label class="lbl">${tr.shortDesc}</label><input class="inp" id="tl-d"/></div>
    <div class="two-col">
      <button class="btn btn-ghost btn-full" onclick="closeSheet()">${tr.cancel}</button>
      <button class="btn btn-p btn-full" onclick="saveTool()">${tr.add}</button>
    </div>`);
}
function saveTool(){
  const n=el("tl-n").value.trim();if(!n)return;
  S.tools=[...S.tools,{id:uid(),icon:el("tl-i").value,name:n,url:el("tl-u").value,category:el("tl-c").value,description:el("tl-d").value}];
  save();closeSheet();renderTools();
}

// ════════════════════════════════════════
// TYPEFORM SYNC
// ════════════════════════════════════════
async function syncOrders(){
  S.syncStatus="syncing";updateSyncUI();
  try{
    const res=await fetch(`${RAILWAY}/orders`);
    if(!res.ok)throw new Error(`HTTP ${res.status}`);
    const remote=await res.json();
    const exTF=new Set(S.orders.map(o=>o.typeformResponseId).filter(Boolean));
    const exId=new Set(S.orders.map(o=>o.id));
    const toAdd=remote.filter(o=>o.clientName&&!exTF.has(o.typeformResponseId)&&!exId.has(o.id));
    if(toAdd.length){S.orders=[...toAdd,...S.orders];save();}
    S.syncStatus="ok";S.lastSync=new Date().toLocaleTimeString("fr-FR");
    if(S.tab==="orders")renderOrders();
    if(S.tab==="dashboard")renderDash();
    buildNav();
  }catch(e){S.syncStatus="error";}
  updateSyncUI();
  setTimeout(()=>{if(S.syncStatus==="error")S.syncStatus="ok";updateSyncUI();},4000);
}
function updateSyncUI(){
  const dot=el("sync-dot");const lbl=el("sync-lbl");const btn=el("sync-btn");
  if(!dot)return;
  if(S.syncStatus==="syncing"){dot.className="sdot sdot-sync";lbl.textContent=t().syncing;if(btn)btn.disabled=true;}
  else if(S.syncStatus==="error"){dot.style.cssText="background:var(--red);box-shadow:0 0 6px var(--red)";dot.className="sdot";lbl.textContent="❌ Erreur";if(btn){btn.disabled=false;btn.textContent=t().syncNow;}}
  else{dot.className="sdot sdot-ok";lbl.textContent=S.lastSync?"Dernière sync : "+S.lastSync:t().connected;if(btn){btn.disabled=false;btn.textContent=t().syncNow;}}
  const cnt=el("tf-cnt");
  if(cnt)cnt.textContent=S.orders.filter(o=>o.source==="typeform"&&o.status==="new").length;
}

function renderTF(){
  const tr=t();
  const newTF=S.orders.filter(o=>o.source==="typeform"&&o.status==="new").length;
  el("page").innerHTML=`<div class="screen">
    <div style="background:linear-gradient(135deg,rgba(88,166,255,.08),rgba(188,140,255,.06));border:1px solid rgba(88,166,255,.25);border-radius:14px;padding:16px;margin-bottom:14px">
      <div style="display:flex;gap:10px;align-items:center;margin-bottom:12px">
        <span style="font-size:24px">🔗</span>
        <div><h3 style="font-size:14px;font-weight:800">Connexion Typeform → Openshore CRM</h3>
        <p style="font-size:10px;color:var(--muted);margin-top:3px">${tr.autoSync}</p></div>
      </div>
      <a href="${FORM_URL}" target="_blank"><button class="btn btn-blue btn-sm">🔗 Ouvrir le formulaire</button></a>
    </div>

    <div class="card" style="border:2px solid rgba(240,165,0,.3);margin-bottom:14px">
      <div class="card-b">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:14px">
          <div style="display:flex;align-items:center;gap:10px">
            <span style="font-size:22px">🔄</span>
            <div>
              <h3 style="font-size:14px;font-weight:800">${tr.syncNow.replace("🔄 ","")}</h3>
              <p style="color:var(--muted);font-size:11px;margin-top:3px;display:flex;align-items:center;gap:6px">
                <span class="sdot sdot-ok" id="sync-dot"></span>
                <span id="sync-lbl">${S.lastSync?"Dernière sync : "+S.lastSync:tr.connected}</span>
              </p>
            </div>
          </div>
          <button class="btn btn-p btn-sm" id="sync-btn" onclick="syncOrders()">${tr.syncNow}</button>
        </div>
        <div class="two-col" style="margin-bottom:12px">
          <div style="background:var(--bg);border-radius:10px;padding:12px;display:flex;align-items:center;gap:8px">
            <div class="sdot sdot-ok"></div>
            <div><div style="font-size:10px;color:var(--muted)">Serveur Railway</div><div style="font-size:12px;font-weight:700">Connecté ✅</div></div>
          </div>
          <div style="background:var(--bg);border-radius:10px;padding:12px">
            <div style="font-size:10px;color:var(--muted)">${tr.newTF}</div>
            <div style="font-size:26px;font-weight:900;color:${newTF>0?"var(--accent)":"var(--muted)"}" id="tf-cnt">${newTF}</div>
          </div>
        </div>
        <p style="color:var(--muted);font-size:10px">ℹ️ Synchronisation automatique toutes les 60s.</p>
      </div>
    </div>

    <div style="background:rgba(63,185,80,.08);border:1px solid rgba(63,185,80,.2);border-radius:12px;padding:12px 14px;display:flex;align-items:center;gap:10px;margin-bottom:14px">
      <span>⏱</span><div>
        <div style="font-weight:800;font-size:12px;color:var(--green)">Deadline automatique J+7</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Chaque commande Typeform reçoit une deadline à 7 jours.</div>
      </div>
    </div>

    <div class="card"><div class="card-b">
      <h3 style="font-size:12px;font-weight:800;margin-bottom:13px">🗂 Champs Typeform → CRM</h3>
      ${[["Décrivez votre landing page de rêve","description"],["Prénom + Nom","clientName"],["Téléphone","clientPhone"],["Email","clientEmail"],["Entreprise","company"],["Objectif de la landing page","landingObjective"],["Décrivez vos offres","offers"],["Documents (lien)","assets"],["3 couleurs de marque","colors"],["Inspiration web","inspiration"]]
        .map(([f,c])=>`<div style="display:grid;grid-template-columns:1fr 18px 1fr;align-items:center;gap:6px;margin-bottom:7px">
          <div style="background:var(--bg);border:1px solid var(--border);border-radius:6px;padding:6px 8px;font-size:9px;color:var(--muted)">📝 ${f}</div>
          <span style="color:var(--muted);text-align:center">→</span>
          <div style="background:var(--adim);border:1px solid rgba(240,165,0,.27);border-radius:6px;padding:6px 8px;font-size:9px;color:var(--accent);font-weight:700">${c}</div>
        </div>`).join("")}
    </div></div>
  </div>`;

  if(syncTimer)clearInterval(syncTimer);
  syncTimer=setInterval(syncOrders,60000);
  updateSyncUI();
}

          <h3 style="font-size:15px;font-weight:800">${title}</h3>
          <button class="sheet-x" onclick="closeSheet()">×</button>

        <div class="sheet-body">${body}</div>

function closeSheet(){el("sheet-wrap").innerHTML="";}
