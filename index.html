<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Openshore — Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#08090C;--surface:#0E1117;--card:#13171F;--border:#1E2430;
  --accent:#F0A500;--adim:rgba(240,165,0,.1);
  --green:#3FB950;--red:#F85149;--blue:#58A6FF;--purple:#BC8CFF;
  --wa:#25D366;--teal:#26C6DA;--orange:#FF9800;
  --text:#E6EDF3;--muted:#7D8590;--dim:#21262D;
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;font-size:14px}
button,input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:4px;height:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:2px}

/* AUTH */
#auth{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px}
#auth.hidden{display:none}
.auth-box{width:100%;max-width:380px}
.auth-logo{text-align:center;margin-bottom:32px}
.auth-logo-icon{width:68px;height:68px;background:var(--accent);border-radius:20px;margin:0 auto 14px;display:flex;align-items:center;justify-content:center;font-size:32px;box-shadow:0 0 50px rgba(240,165,0,.4)}
.auth-logo h1{font-size:28px;font-weight:900;letter-spacing:-0.5px}
.auth-logo p{font-size:10px;color:var(--accent);font-weight:700;letter-spacing:3px;text-transform:uppercase;margin-top:5px}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:26px;margin-bottom:12px}
.auth-card h2{font-size:18px;font-weight:800;margin-bottom:4px}
.auth-card .sub{color:var(--muted);font-size:12px;margin-bottom:22px}

/* APP SHELL */
#app{display:none;height:100vh;overflow:hidden}
#app.visible{display:flex}
@media(min-width:900px){
  #app{flex-direction:row}
  #sidebar{display:flex!important;flex-direction:column;width:230px;min-width:230px;background:var(--surface);border-right:1px solid var(--border);height:100vh;flex-shrink:0}
  #topbar,#bottomnav{display:none!important}
  #content{flex:1;overflow-y:auto;height:100vh}
  #page{padding:28px 32px 40px;max-width:900px;margin:0 auto}
}
@media(min-width:600px) and (max-width:899px){
  #app{flex-direction:column}
  #sidebar{display:none!important}
  #topbar,#bottomnav{display:flex!important}
  #content{flex:1;overflow-y:auto}
  #page{padding:20px 20px 90px;max-width:700px;margin:0 auto}
}
@media(max-width:599px){
  #app{flex-direction:column}
  #sidebar{display:none!important}
  #topbar,#bottomnav{display:flex!important}
  #content{flex:1;overflow-y:auto}
  #page{padding:14px 14px 90px}
}

/* SIDEBAR */
#sidebar{display:none}
.sb-logo{padding:20px 16px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px}
.sb-logo-icon{width:34px;height:34px;background:var(--accent);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.sb-logo h1{font-size:14px;font-weight:900;line-height:1.1}
.sb-logo p{font-size:8px;color:var(--accent);font-weight:700;letter-spacing:2px;text-transform:uppercase;margin-top:2px}
.sb-nav{padding:10px 8px;flex:1;overflow-y:auto}
.sb-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 12px;border:none;background:transparent;border-radius:10px;color:var(--muted);font-size:13px;font-weight:600;cursor:pointer;transition:all .15s;margin-bottom:2px;text-align:left}
.sb-btn:hover{background:var(--card);color:var(--text)}
.sb-btn.active{background:var(--adim);color:var(--accent);font-weight:800}
.sb-btn .si{font-size:16px;width:22px;text-align:center;flex-shrink:0}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:10px;padding:1px 7px;font-size:10px;font-weight:900}
.sb-footer{padding:12px 8px;border-top:1px solid var(--border)}
.sb-user{display:flex;align-items:center;gap:10px;padding:8px 12px;margin-bottom:8px}
.sb-langs{display:flex;gap:5px;padding:0 4px;margin-bottom:6px}

/* TOPBAR */
#topbar{display:none;align-items:center;justify-content:space-between;padding:0 14px;height:52px;flex-shrink:0;background:rgba(14,17,23,.95);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10}
.tb-right{display:flex;align-items:center;gap:7px}

/* BOTTOM NAV */
#bottomnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:10;background:rgba(14,17,23,.97);backdrop-filter:blur(20px);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom,0px)}
.bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;padding:7px 2px;border:none;background:transparent;border-top:2px solid transparent;cursor:pointer;transition:all .15s}
.bn-btn.active{background:var(--adim);border-top-color:var(--accent)}
.bn-icon{font-size:18px;position:relative}
.bn-badge{position:absolute;top:-4px;right:-8px;background:var(--red);color:#fff;border-radius:10px;width:15px;height:15px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900}
.bn-label{font-size:8px;font-weight:700;color:var(--muted);letter-spacing:.3px;text-transform:uppercase}
.bn-btn.active .bn-label{color:var(--accent)}

/* COMPONENTS */
.btn{border-radius:9px;font-weight:700;letter-spacing:.3px;white-space:nowrap;cursor:pointer;border:none;transition:opacity .15s;font-size:13px;padding:10px 18px;display:inline-flex;align-items:center;gap:6px}
.btn:hover{opacity:.82}.btn:active{opacity:.65}
.btn-sm{font-size:11px;padding:5px 11px;border-radius:7px}
.btn-xs{font-size:10px;padding:3px 8px;border-radius:6px}
.btn-full{width:100%;justify-content:center}
.btn-p{background:var(--accent);color:#000}
.btn-ghost{background:transparent;color:var(--muted);border:1px solid var(--border)!important}
.btn-blue{background:rgba(88,166,255,.12);color:var(--blue);border:1px solid rgba(88,166,255,.3)!important}
.btn-green{background:rgba(63,185,80,.12);color:var(--green);border:1px solid rgba(63,185,80,.3)!important}
.btn-red{background:rgba(248,81,73,.12);color:var(--red);border:1px solid rgba(248,81,73,.3)!important}
.btn-wa{background:rgba(37,211,102,.12);color:var(--wa);border:1px solid rgba(37,211,102,.3)!important}
.btn-teal{background:rgba(38,198,218,.12);color:var(--teal);border:1px solid rgba(38,198,218,.3)!important}
.btn-purple{background:rgba(188,140,255,.12);color:var(--purple);border:1px solid rgba(188,140,255,.3)!important}
.btn-orange{background:rgba(255,152,0,.12);color:var(--orange);border:1px solid rgba(255,152,0,.3)!important}

.field{display:flex;flex-direction:column;gap:5px}
.lbl{color:var(--muted);font-size:10px;font-weight:800;letter-spacing:.8px;text-transform:uppercase}
.inp{background:var(--bg);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:10px 12px;font-size:13px;outline:none;width:100%;transition:border-color .2s}
.inp:focus{border-color:var(--accent)}
textarea.inp{resize:vertical;min-height:70px}
select.inp{cursor:pointer}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.card-h{padding:13px 16px 10px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;gap:10px}
.card-b{padding:14px 16px}
.card-f{padding:10px 14px 13px;border-top:1px solid var(--border);display:flex;gap:6px;flex-wrap:wrap}

.badge{border-radius:6px;padding:3px 9px;font-size:10px;font-weight:700}
.pill{border-radius:20px;padding:2px 9px;font-size:10px;font-weight:700}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;flex-shrink:0;background:linear-gradient(135deg,rgba(240,165,0,.8),rgba(188,140,255,.8));border:2px solid rgba(240,165,0,.2)}

.alert{border-radius:8px;padding:9px 13px;font-size:12px;font-weight:700}
.alert-e{background:rgba(248,81,73,.1);border:1px solid rgba(248,81,73,.3);color:var(--red)}
.alert-s{background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);color:var(--green)}
.alert-i{background:rgba(88,166,255,.1);border:1px solid rgba(88,166,255,.3);color:var(--blue)}
.alert-w{background:rgba(240,165,0,.1);border:1px solid rgba(240,165,0,.3);color:var(--accent)}

.stats-grid{display:grid;gap:10px;margin-bottom:16px}
@media(min-width:600px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:599px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 12px;position:relative;overflow:hidden}
.stat-ico{position:absolute;top:8px;right:10px;font-size:20px;opacity:.1}
.stat-val{font-size:26px;font-weight:900;line-height:1}
.stat-lbl{color:var(--muted);font-size:10px;margin-top:4px;font-weight:700}

.tools-grid{display:grid;gap:10px}
@media(min-width:700px){.tools-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:500px) and (max-width:699px){.tools-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:499px){.tools-grid{grid-template-columns:1fr 1fr}}
.tool-card{display:flex;align-items:center;gap:10px;padding:13px;background:var(--card);border:1px solid var(--border);border-radius:12px;cursor:pointer;transition:all .15s}
.tool-card:hover{border-color:var(--accent);transform:translateY(-2px)}
.tool-ico{width:36px;height:36px;background:var(--adim);border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}

.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;-webkit-overflow-scrolling:touch;margin-bottom:12px}
.filters::-webkit-scrollbar{display:none}
.fbtn{background:var(--card);color:var(--muted);border:1px solid var(--border);border-radius:20px;padding:5px 12px;font-size:10px;font-weight:700;white-space:nowrap;flex-shrink:0;cursor:pointer;transition:all .15s}
.fbtn.active{background:var(--accent);color:#000;border-color:var(--accent)}

.two-col{display:grid;gap:10px}
@media(min-width:480px){.two-col{grid-template-columns:1fr 1fr}}

.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadein .2s}
@media(min-width:600px){.overlay{align-items:center}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.sheet{background:var(--card);border:1px solid var(--border);width:100%;max-width:560px;max-height:92vh;overflow-y:auto;box-shadow:0 -20px 60px rgba(0,0,0,.8);animation:slideup .25s ease;border-radius:20px 20px 0 0}
@media(min-width:600px){.sheet{border-radius:20px;margin:20px}}
@keyframes slideup{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.sheet-handle{display:flex;justify-content:center;padding:12px 0 0}
.sheet-handle-bar{width:40px;height:4px;background:var(--border);border-radius:2px}
@media(min-width:600px){.sheet-handle{display:none}}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 0}
.sheet-body{padding:16px 20px 36px;display:flex;flex-direction:column;gap:12px}
.sheet-x{background:none;border:none;color:var(--muted);font-size:26px;line-height:1;cursor:pointer;padding:4px}

.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px}
.modal{background:var(--card);border:1px solid var(--border);border-radius:20px;padding:28px;width:100%;max-width:360px;box-shadow:0 20px 60px rgba(0,0,0,.9)}

.section-title{font-size:11px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:1.5px;margin:16px 0 10px}
.screen{animation:pagein .18s ease}
@keyframes pagein{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.spinner{display:flex;align-items:center;justify-content:center;padding:60px;flex-direction:column;gap:14px}
.spin{width:32px;height:32px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* KANBAN */
.kanban-wrap{display:flex;gap:10px;overflow-x:auto;padding-bottom:16px;align-items:flex-start;-webkit-overflow-scrolling:touch}
.kanban-wrap::-webkit-scrollbar{height:4px}
.kanban-col{flex-shrink:0;width:240px;background:var(--surface);border:1px solid var(--border);border-radius:14px;overflow:hidden}
.kanban-col-h{padding:10px 12px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.kanban-col-body{padding:8px;min-height:60px;max-height:70vh;overflow-y:auto}
.kanban-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:10px 12px;margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.kanban-card:hover{border-color:var(--accent)}

/* RV TAGS */
.rv-tag{display:inline-flex;align-items:center;gap:4px;background:rgba(38,198,218,.1);border:1px solid rgba(38,198,218,.25);border-radius:6px;padding:3px 8px;font-size:10px;font-weight:700;color:var(--teal);margin:2px 2px 2px 0}

/* COMMENTS */
.cmt-wrap{border-top:1px solid var(--border);padding:10px 14px}
.cmt-item{display:flex;gap:8px;margin-bottom:10px}
.cmt-bubble{background:var(--bg);border:1px solid var(--border);border-radius:10px;padding:8px 10px;flex:1}
.cmt-admin{background:rgba(240,165,0,.06);border-color:rgba(240,165,0,.2)}
.cmt-fl{background:rgba(188,140,255,.06);border-color:rgba(188,140,255,.2)}

/* TIMELINE */
.tl-item{display:flex;gap:10px;align-items:flex-start;margin-bottom:10px;position:relative}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:3px}
.tl-line{position:absolute;left:4px;top:13px;bottom:-10px;width:2px;background:var(--border)}

/* DELIVERY */
.delivery-badge{display:inline-flex;align-items:center;gap:6px;background:rgba(63,185,80,.1);border:1px solid rgba(63,185,80,.3);border-radius:8px;padding:5px 10px;font-size:11px;font-weight:700;color:var(--green)}

/* BILLING */
.billing-month{background:var(--card);border:1px solid var(--border);border-radius:12px;margin-bottom:10px;overflow:hidden}
.billing-month-h{padding:12px 14px;background:var(--dim);display:flex;align-items:center;justify-content:space-between;font-weight:800;font-size:13px}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth">
  <div style="position:absolute;top:16px;right:16px;display:flex;gap:5px">
    <button class="btn btn-sm btn-p" id="al-fr" onclick="setLang('fr')">FR</button>
    <button class="btn btn-sm btn-ghost" id="al-en" onclick="setLang('en')">EN</button>
  </div>
  <div class="auth-box">
    <div class="auth-logo">
      <div class="auth-logo-icon">⚡</div>
      <h1>Openshore</h1><p>Workspace</p>
    </div>
    <div class="auth-card">
      <h2 id="a-title"></h2><div class="sub" id="a-sub"></div>
      <div style="display:flex;flex-direction:column;gap:13px">
        <div class="field"><label class="lbl" id="a-el"></label><input id="a-email" class="inp" type="email" placeholder="votre@email.com" onkeydown="if(event.key==='Enter')tryLogin()"/></div>
        <div class="field"><label class="lbl" id="a-pl"></label>
          <div style="position:relative">
            <input id="a-pw" class="inp" type="password" placeholder="••••••••" style="padding-right:44px" onkeydown="if(event.key==='Enter')tryLogin()"/>
            <button onclick="togglePw('a-pw',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:15px;color:var(--muted);cursor:pointer">👁</button>
          </div>
        </div>
        <div id="a-err" class="alert alert-e" style="display:none"></div>
        <button class="btn btn-p btn-full" id="a-btn" onclick="tryLogin()"></button>
      </div>
    </div>
    <button onclick="openAdminModal()" style="width:100%;background:var(--surface);border:1px solid var(--border);border-radius:12px;color:var(--muted);padding:12px;font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;gap:8px;cursor:pointer;transition:border-color .15s" onmouseover="this.style.borderColor='var(--accent)'" onmouseout="this.style.borderColor='var(--border)'">🔐 <span id="a-admin-lbl"></span></button>
  </div>
</div>

<!-- ADMIN MODAL -->
<div id="admin-modal" class="modal-bg" style="display:none">
  <div class="modal">
    <div style="text-align:center;margin-bottom:20px">
      <div style="font-size:36px;margin-bottom:8px">🔐</div>
      <h3 id="am-title" style="font-size:17px;font-weight:800"></h3>
      <p id="am-sub" style="color:var(--muted);font-size:12px;margin-top:5px"></p>
    </div>
    <div style="display:flex;flex-direction:column;gap:12px">
      <div style="position:relative">
        <input id="am-pw" class="inp" type="password" placeholder="••••••••" style="padding-right:44px" onkeydown="if(event.key==='Enter')tryAdmin()"/>
        <button onclick="togglePw('am-pw',this)" style="position:absolute;right:12px;top:50%;transform:translateY(-50%);background:none;border:none;font-size:15px;color:var(--muted);cursor:pointer">👁</button>
      </div>
      <div id="am-err" class="alert alert-e" style="display:none"></div>
      <button class="btn btn-p btn-full" onclick="tryAdmin()" id="am-btn"></button>
      <button class="btn btn-ghost btn-full" onclick="el('admin-modal').style.display='none'" id="am-cancel"></button>
    </div>
  </div>
</div>

<!-- APP -->
<div id="app">
  <nav id="sidebar">
    <div class="sb-logo">
      <div class="sb-logo-icon">⚡</div>
      <div><h1>Openshore</h1><p>Workspace</p></div>
    </div>
    <div class="sb-nav" id="sb-nav"></div>
    <div class="sb-footer">
      <div class="sb-user" id="sb-user"></div>
      <div class="sb-langs">
        <button class="btn btn-sm btn-p" id="sl-fr" onclick="setLang('fr')">FR</button>
        <button class="btn btn-sm btn-ghost" id="sl-en" onclick="setLang('en')">EN</button>
      </div>
      <button class="btn btn-ghost btn-full btn-sm" onclick="logout()">⎋ <span id="sb-logout"></span></button>
    </div>
  </nav>
  <div id="content">
    <div id="topbar">
      <div style="display:flex;align-items:center;gap:8px">
        <div style="width:28px;height:28px;background:var(--accent);border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:14px">⚡</div>
        <div style="line-height:1.1"><div style="font-size:13px;font-weight:900">Openshore</div><div style="font-size:8px;color:var(--accent);font-weight:700;letter-spacing:1.5px;text-transform:uppercase">Workspace</div></div>
      </div>
      <div class="tb-right">
        <button class="btn btn-sm btn-p" id="tl-fr" onclick="setLang('fr')">FR</button>
        <button class="btn btn-sm btn-ghost" id="tl-en" onclick="setLang('en')">EN</button>
        <span id="tb-role"></span>
        <button onclick="logout()" style="background:none;border:none;color:var(--muted);font-size:18px;cursor:pointer;padding:4px">⎋</button>
      </div>
    </div>
    <div id="page"></div>
  </div>
  <nav id="bottomnav"></nav>
</div>
<div id="sheet-wrap"></div>

<script>
const ADMIN_PW       = "Openshore37.";
const API            = "https://openshore-webhook-production.up.railway.app";
const FORM_ORDERS    = "https://form.typeform.com/to/rJdfntNq";
const FORM_REVISIONS = "";

const STATUS_COLORS = {new:"#58A6FF",assigned:"#BC8CFF",inprogress:"#F0A500",review:"#FF9800",done:"#3FB950",cancelled:"#F85149"};

let S = {
  role:null, me:null, lang:"fr", tab:"dashboard",
  oFilter:"all", oSearch:"", oView:"list",
  rvFilter:"all", rvSearch:"", rvView:"list",
  orders:[], freelancers:[], tools:[], revisions:[],
  syncTimer:null,
};

const T = {
fr:{
  login:"Bienvenue", loginSub:"Connectez-vous à votre espace",
  emailL:"Email", pwL:"Mot de passe", loginBtn:"Se connecter",
  adminBtn:"Accès Administrateur", adminTitle:"Espace Admin", adminSub:"Entrez le mot de passe",
  wrongPw:"Identifiants incorrects.", wrongAdmin:"Mot de passe incorrect.",
  cancel:"Annuler", save:"Sauvegarder", create:"Créer", add:"Ajouter", edit:"Modifier", del:"Supprimer",
  logout:"Déconnexion", admin:"Admin", freelancer:"Freelance",
  dashboard:"Dashboard", orders:"Commandes", revisions:"Révisions",
  freelancers:"Freelances", tools:"Outils", typeform:"Typeform", billing:"Facturation",

const el = id => document.getElementById(id);
function uid(){ return Math.random().toString(36).slice(2,9) }
function d7(){ return new Date(Date.now()+7*864e5).toISOString().slice(0,10) }
function d24(){ return new Date(Date.now()+24*3600000).toISOString() }
function fmt(iso){ return iso ? new Date(iso).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"}) : "—" }
function fmtFull(iso){ return iso ? new Date(iso).toLocaleString("fr-FR",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}) : "—" }
function fmtMonth(iso){ return iso ? new Date(iso).toLocaleDateString("fr-FR",{month:"long",year:"numeric"}) : "" }
function showErr(id,msg){ const e=el(id); if(!e)return; e.textContent=msg; e.style.display="block"; setTimeout(()=>e.style.display="none",3500) }
function togglePw(id,btn){ const i=el(id); i.type=i.type==="password"?"text":"password"; btn.textContent=i.type==="password"?"👁":"🙈" }
function mkAv(ini,sz=36){ return `<div class="av" style="width:${sz}px;height:${sz}px;font-size:${sz*.33}px">${ini||"?"}</div>` }
function mkBadge(sk,map){ const c=STATUS_COLORS[sk]||"#58A6FF"; return `<span class="badge" style="background:${c}20;color:${c};border:1px solid ${c}40">${(map||t().sl)[sk]||sk}</span>` }
function mkPill(lbl,c="#F0A500"){ return `<span class="pill" style="background:${c}18;color:${c};border:1px solid ${c}33">${lbl}</span>` }
function deadlineRv(iso){
  if(!iso)return"";
  const ms=new Date(iso)-Date.now(), h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000);
  if(ms<=0) return `<span style="color:var(--red);font-weight:800">⚠️ Dépassée</span>`;
  if(h<2)   return `<span style="color:var(--red);font-weight:800">🔴 ${h}h${String(m).padStart(2,"0")} restantes</span>`;
  if(h<6)   return `<span style="color:var(--accent);font-weight:700">🟠 ${h}h${String(m).padStart(2,"0")} restantes</span>`;
  return `<span style="color:var(--muted)">⏱ ${fmtFull(iso)}</span>`;
}
function deadlineOrder(iso){
  if(!iso)return"";
  const d=Math.ceil((new Date(iso)-Date.now())/864e5);
  const c=d<=0?"var(--red)":d<=2?"var(--accent)":"var(--muted)";
  return `<span style="font-size:11px;color:${c};font-weight:${d<=2?"700":"400"}">⏱ ${fmt(iso)} (${d<=0?"Dépassé":"J-"+d})</span>`;
}
function rvTypeTags(rv){
  let t="";
  if(rv.revisionAspect)  t+=`<span class="rv-tag">🎨 Aspect</span>`;
  if(rv.revisionContent) t+=`<span class="rv-tag">📄 Contenu</span>`;
  if(rv.revisionText)    t+=`<span class="rv-tag">✍️ Texte</span>`;
  if(rv.revisionOther)   t+=`<span class="rv-tag">💬 Autre</span>`;
  return t?`<div style="margin-bottom:8px">${t}</div>`:"";
}
function showLoading(){ el("page").innerHTML=`<div class="spinner"><div class="spin"></div><div style="color:var(--muted);font-size:13px">${t().loading}</div></div>` }

// Calcul délai moyen (assigned→done) en jours
function avgDelayDays(fid){
  const hist = S._histCache||[];
  const flOrders = S.orders.filter(o=>o.freelanceId===fid && o.status==="done");
  if(!flOrders.length) return null;
  let total=0, count=0;
  flOrders.forEach(o=>{
    const assigned = hist.filter(h=>h.itemId===o.id&&h.newStatus==="assigned").sort((a,b)=>new Date(a.createdAt)-new Date(b.createdAt))[0];
    const done     = hist.filter(h=>h.itemId===o.id&&h.newStatus==="done").sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt))[0];
    if(assigned&&done){
      total += (new Date(done.createdAt)-new Date(assigned.createdAt))/864e5;
      count++;
    }
  });
  return count>0 ? Math.round(total/count) : null;
}

// ── API ───────────────────────────────────────────────────────────
async function api(method,path,body){
  const opts={method,headers:{"Content-Type":"application/json"}};
  if(body) opts.body=JSON.stringify(body);
  const res=await fetch(API+path,opts);
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}
async function loadAll(){
  showLoading();
  try {
    const [orders,freelancers,tools,revisions]=await Promise.all([
      api("GET","/orders"), api("GET","/freelancers"),
      api("GET","/tools"),  api("GET","/revisions"),
    ]);
    S.orders=orders; S.freelancers=freelancers; S.tools=tools; S.revisions=revisions;
  } catch(e){ console.error("loadAll:",e); }
}
async function syncData(){
  if(!S.role)return;
  try {
    const [orders,revisions]=await Promise.all([api("GET","/orders"),api("GET","/revisions")]);
    S.orders=orders; S.revisions=revisions;
    buildNav(); renderPage();
  } catch(e){}
}

async function tryLogin(){
  const email=el("a-email").value.trim().toLowerCase(), pw=el("a-pw").value;
  el("a-btn").textContent="⏳..."; el("a-btn").disabled=true;
  try {
    const fls=await api("GET","/freelancers"); S.freelancers=fls;
    const fl=fls.find(f=>f.email.toLowerCase()===email&&f.password===pw&&f.active);
    if(fl) doLogin("freelancer",fl); else showErr("a-err",t().wrongPw);
  } catch(e){ showErr("a-err","Erreur de connexion."); }
  el("a-btn").textContent=t().loginBtn; el("a-btn").disabled=false;
}
function openAdminModal(){ el("admin-modal").style.display="flex"; el("am-pw").value=""; }
function tryAdmin(){
  if(el("am-pw").value===ADMIN_PW){ el("admin-modal").style.display="none"; doLogin("admin",null); }
  else showErr("am-err",t().wrongAdmin);
}
async function doLogin(role,me){
  S.role=role; S.me=me; S.tab="dashboard";
  el("auth").classList.add("hidden");
  el("app").classList.add("visible");
  await loadAll();
  buildNav(); renderPage();
  S.syncTimer=setInterval(syncData,10000);
  document.addEventListener("visibilitychange",()=>{ if(!document.hidden) syncData(); });
}
function logout(){
  S.role=null; S.me=null;
  if(S.syncTimer)clearInterval(S.syncTimer);
  el("app").classList.remove("visible");
  el("auth").classList.remove("hidden");
  el("a-email").value=""; el("a-pw").value="";
}

function buildNav(){
  const tabs=S.role==="admin"?ADM_TABS:FL_TABS;
  const newO =S.role==="admin"?S.orders.filter(o=>o.status==="new").length:S.orders.filter(o=>o.freelanceId===S.me?.id&&o.status==="assigned").length;
  const newRV=S.role==="admin"?S.revisions.filter(r=>r.status==="new").length:S.revisions.filter(r=>r.freelanceId===S.me?.id&&r.status==="assigned").length;

  el("sb-nav").innerHTML=tabs.map(tb=>`
    <button class="sb-btn${S.tab===tb.k?" active":""}" onclick="goTab('${tb.k}')">
      <span class="si">${tb.i}</span>${tr[tb.k]||tb.k}

      ${tb.k==="revisions"&&newRV>0?`<span class="sb-badge">${newRV}</span>`:""}
    </button>`).join("");
  el("sb-logout").textContent=tr.logout;
  const me=S.me;

    <button class="bn-btn${S.tab===tb.k?" active":""}" onclick="goTab('${tb.k}')">
      <div class="bn-icon">${tb.i}
        ${tb.k==="orders"&&newO>0?`<div class="bn-badge">${newO}</div>`:""}

function goTab(k){ S.tab=k; buildNav(); renderPage(); el("content").scrollTo(0,0); }

function renderPage(){
  const k=S.tab;

  else if(k==="freelancers"&&S.role==="admin") renderFL();
  else if(k==="billing"&&S.role==="admin") renderBilling();

function renderDash(){
  const tr=t();
  const myO =S.role==="freelancer"?S.orders.filter(o=>o.freelanceId===S.me?.id):S.orders;
  const myRV=S.role==="freelancer"?S.revisions.filter(r=>r.freelanceId===S.me?.id):S.revisions;
  const stats=S.role==="admin"?[
    {l:tr.totalOrders,v:S.orders.length,c:"var(--blue)",i:"📋"},
    {l:tr.totalRevisions,v:S.revisions.length,c:"var(--teal)",i:"🔁"},
    {l:tr.rvOpen,v:S.revisions.filter(r=>!["done","cancelled"].includes(r.status)).length,c:"var(--accent)",i:"⏳"},
    {l:tr.activeFl,v:S.freelancers.filter(f=>f.active).length,c:"var(--purple)",i:"👥"},
  ]:[
    {l:tr.totalOrders,v:myO.length,c:"var(--blue)",i:"📋"},
    {l:tr.totalRevisions,v:myRV.length,c:"var(--teal)",i:"🔁"},
    {l:tr.rvOpen,v:myRV.filter(r=>!["done","cancelled"].includes(r.status)).length,c:"var(--accent)",i:"⏳"},
  ];
  const urgentRV=[...myRV].filter(r=>!["done","cancelled"].includes(r.status)&&r.deadline).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline)).slice(0,4);
  const recentO=[...myO].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,3);
  let h=`<div class="screen">`;
  if(S.me) h+=`<div style="background:linear-gradient(135deg,rgba(240,165,0,.08),rgba(188,140,255,.08));border:1px solid rgba(240,165,0,.18);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:16px">${mkAv(S.me.avatar,42)}<div><div style="font-weight:800;font-size:14px">👋 ${S.me.name}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${S.me.specialty}</div></div></div>`;
  h+=`<div class="stats-grid">${stats.map(s=>`<div class="stat"><div class="stat-ico">${s.i}</div><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join("")}</div>`;
  // Révisions urgentes
  h+=`<div class="card" style="margin-bottom:12px;border-color:rgba(38,198,218,.25)"><div class="card-h"><span style="font-size:13px;font-weight:800">🔁 ${tr.recentRevisions}</span></div>`;
  if(!urgentRV.length) h+=`<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">✅ Aucune révision urgente</div>`;
  urgentRV.forEach(r=>{
    const ms=r.deadline?new Date(r.deadline)-Date.now():null;
    const bc=ms!==null&&ms<7200000?"rgba(248,81,73,.5)":ms!==null&&ms<21600000?"rgba(240,165,0,.4)":"var(--border)";
    h+=`<div style="padding:11px 16px;border-bottom:1px solid var(--border);border-left:3px solid ${bc}"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px"><div style="font-weight:700;font-size:13px">${r.clientName}</div>${mkBadge(r.status,tr.rl)}</div><div style="font-size:11px;color:var(--teal)">${r.projectName||""}</div><div style="font-size:11px;margin-top:2px">${deadlineRv(r.deadline)}</div></div>`;
  });
  h+=`</div>`;
  // Commandes récentes
  h+=`<div class="card" style="margin-bottom:12px"><div class="card-h"><span style="font-size:13px;font-weight:800">📋 ${tr.recentOrders}</span></div>`;
  if(!recentO.length) h+=`<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">${tr.noOrders}</div>`;
  recentO.forEach(o=>{h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);gap:8px"><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.clientName}</div><div style="font-size:10px;color:var(--muted)">${o.projectType||""} · ${fmt(o.createdAt)}</div></div>${mkBadge(o.status,tr.sl)}</div>`;});
  h+=`</div>`;
  // Charge équipe (admin)
  if(S.role==="admin"){
    h+=`<div class="card"><div class="card-h"><span style="font-size:13px;font-weight:800">${tr.flLoad}</span></div>`;
    S.freelancers.filter(f=>f.active).forEach(f=>{
      const cO=S.orders.filter(o=>o.freelanceId===f.id&&!["done","delivered","cancelled"].includes(o.status)).length;
      const cRV=S.revisions.filter(r=>r.freelanceId===f.id&&!["done","cancelled"].includes(r.status)).length;
      const pct=Math.min(100,Math.round((cO+cRV)*20));
      const barC=pct>80?"var(--red)":pct>50?"var(--accent)":"var(--green)";
      h+=`<div style="padding:11px 16px;border-bottom:1px solid var(--border)">${mkAv(f.avatar,28)}
        <div style="flex:1;margin-left:10px"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;font-weight:700">${f.name}</span><span style="font-size:10px;color:var(--muted)">${cO} cmd · ${cRV} rév</span></div>
        <div style="height:4px;background:var(--border);border-radius:2px"><div style="height:4px;background:${barC};border-radius:2px;width:${pct}%;transition:width .3s"></div></div></div>`;
      h=h.replace(`${mkAv(f.avatar,28)}\n        <div`,`<div style="display:flex;align-items:center;gap:10px">${mkAv(f.avatar,28)}<div`);
      h+=`</div></div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;
  el("page").innerHTML=h;
}

function renderRevisions(){
  const tr=t();
  const pool=S.role==="freelancer"?S.revisions.filter(r=>r.freelanceId===S.me?.id):S.revisions;
  let list=pool.filter(r=>{
    if(S.rvFilter!=="all"&&r.status!==S.rvFilter)return false;
    if(S.rvSearch){const q=S.rvSearch.toLowerCase();if(!r.clientName?.toLowerCase().includes(q)&&!r.projectName?.toLowerCase().includes(q))return false;}
    return true;
  });
  list=[...list].sort((a,b)=>{
    if(!a.deadline&&!b.deadline)return 0; if(!a.deadline)return 1; if(!b.deadline)return -1;
    return new Date(a.deadline)-new Date(b.deadline);
  });
  let h=`<div class="screen">`;
  if(S.role==="freelancer") h+=`<div class="alert alert-i" style="margin-bottom:12px">🔁 ${tr.myOnlyRev}</div>`;
  h+=`<div style="display:flex;gap:8px;margin-bottom:10px;align-items:center">
    <input class="inp" style="flex:1" placeholder="${tr.search}" value="${S.rvSearch}" oninput="S.rvSearch=this.value;renderRevisions()"/>
    <button class="btn btn-ghost btn-sm" onclick="S.rvView=S.rvView==='list'?'kanban':'list';renderRevisions()">${S.rvView==="list"?"🔲":"☰"}</button>
    ${S.role==="admin"?`<button class="btn btn-teal btn-sm" onclick="openRevisionSheet(null)">${tr.addRevision}</button>`:""}
  </div>
  <div class="filters">${["all",...Object.keys(tr.rl)].map(s=>`<button class="fbtn${S.rvFilter===s?" active":""}" onclick="S.rvFilter='${s}';renderRevisions()">${s==="all"?tr.all:tr.rl[s]}</button>`).join("")}</div>`;
  if(S.rvView==="kanban"){ h+=renderKanban(list,"revision"); }
  else {
    if(!list.length) h+=`<div class="card"><div style="padding:32px;text-align:center;color:var(--muted);font-size:13px">${S.role==="freelancer"?tr.noMissions:tr.noRevisions}</div></div>`;

  h+=`</div>`;

async function saveDelivery(id, type){

    const endpoint=type==="revision"?"/revisions":"/orders";
    const item=type==="revision"?S.revisions.find(x=>x.id===id):S.orders.find(x=>x.id===id);
    const u=await api("PUT",`${endpoint}/${id}`,{...item,deliveryUrl:url,status:"review"});

  }catch(e){alert("Erreur: "+e.message);}

    </div>`;
  });
  if(item?.freelanceId) h+=`<button class="btn btn-red btn-full" onclick="doAssign('${itemId}','${type}','')">${tr.unassign}</button>`;
  openSheet(`${tr.assignTo} — ${item?.clientName||""}`,h);
}
async function doAssign(itemId,type,fid){
  const isRev=type==="revision";
  const item=isRev?S.revisions.find(x=>x.id===itemId):S.orders.find(x=>x.id===itemId);
  try{
    const updated=await api("PUT",`/${isRev?"revisions":"orders"}/${itemId}`,{...item,freelanceId:fid||null,status:fid?"assigned":"new",changedBy:"admin"});
    if(isRev)S.revisions=S.revisions.map(x=>x.id===itemId?updated:x);
    else S.orders=S.orders.map(x=>x.id===itemId?updated:x);
    closeSheet();
    if(fid){
      const fl=S.freelancers.find(f=>f.id===fid);
      if(fl?.phone){
        const msg=isRev?t().waRevision(fl.name,item.clientName,item.projectName||""):t().waOrder(fl.name,item.clientName,item.projectType||"");
        window.open(`https://wa.me/${fl.phone.replace(/\D/g,"")}?text=${encodeURIComponent(msg)}`,"_blank");
      }
    }
    if(isRev)renderRevisions(); else renderOrders();
    buildNav();
  }catch(e){alert("Erreur lors de l'assignation : "+(e.message||e));}
}
function sendWA(type,id){
  const isRev=type==="revision";
  const item=isRev?S.revisions.find(x=>x.id===id):S.orders.find(x=>x.id===id);
  const fl=S.freelancers.find(f=>f.id===item?.freelanceId);
  if(!fl?.phone)return;
  const msg=isRev?t().waRevision(fl.name,item.clientName,item.projectName||""):t().waOrder(fl.name,item.clientName,item.projectType||"");
  window.open(`https://wa.me/${fl.phone.replace(/\D/g,"")}?text=${encodeURIComponent(msg)}`,"_blank");
}

// ── COMMENTS ─────────────────────────────────────────────────────
async function openComments(itemId,type,name){
  const tr=t();
  openSheet(`💬 ${tr.comments} — ${name}`,`<div id="cmt-list" style="min-height:60px"><div class="spinner"><div class="spin"></div></div></div>
    <div style="display:flex;gap:8px;margin-top:8px">
      <textarea class="inp" id="cmt-input" placeholder="${tr.addComment}" style="flex:1;min-height:44px;resize:none"></textarea>
      <button class="btn btn-p" onclick="postComment('${itemId}','${type}')" style="align-self:flex-end">➤</button>
    </div>`);
  await loadComments(itemId,type);
}
async function loadComments(itemId,type){
  try{
    const comments=await api("GET",`/comments/${type}/${itemId}`);
    const wrap=el("cmt-list");
    if(!wrap)return;
    if(!comments.length){wrap.innerHTML=`<div style="text-align:center;color:var(--muted);font-size:12px;padding:16px">Aucun commentaire.</div>`;return;}
    wrap.innerHTML=comments.map(c=>{
      const isAdmin=c.authorRole==="admin";
      return `<div class="cmt-item">
        <div class="av" style="width:28px;height:28px;font-size:11px;flex-shrink:0;background:${isAdmin?"linear-gradient(135deg,#F0A500,#FF9800)":"linear-gradient(135deg,#BC8CFF,#58A6FF)"}">${c.authorName.slice(0,2).toUpperCase()}</div>
        <div class="cmt-bubble ${isAdmin?"cmt-admin":"cmt-fl"}" style="flex:1">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px">
            <span style="font-size:11px;font-weight:800;color:${isAdmin?"var(--accent)":"var(--purple)"}">${c.authorName}</span>
            <span style="font-size:10px;color:var(--muted)">${fmtFull(c.createdAt)}</span>
          </div>
          <div style="font-size:12px;line-height:1.5;white-space:pre-wrap">${c.content}</div>
        </div>
      </div>`;
    }).join("");
  }catch(e){const w=el("cmt-list");if(w)w.innerHTML=`<div style="color:var(--red);font-size:12px">Erreur chargement.</div>`;}
}
async function postComment(itemId,type){
  const input=el("cmt-input");
  const content=input?.value.trim(); if(!content)return;
  const authorName=S.role==="admin"?"Admin":(S.me?.name||"Freelance");
  try{
    await api("POST","/comments",{itemType:type,itemId,authorName,authorRole:S.role,content});
    input.value="";
    await loadComments(itemId,type);
  }catch(e){alert("Erreur: "+e.message);}
}

  S.freelancers.forEach(f=>{
    const cO=S.orders.filter(o=>o.freelanceId===f.id&&!["done","delivered","cancelled"].includes(o.status)).length;
    const cRV=S.revisions.filter(r=>r.freelanceId===f.id&&!["done","cancelled"].includes(r.status)).length;
    const doneO=S.orders.filter(o=>o.freelanceId===f.id&&["done","delivered"].includes(o.status)).length;
    const doneRV=S.revisions.filter(r=>r.freelanceId===f.id&&r.status==="done").length;
    const totalBudget=S.orders.filter(o=>o.freelanceId===f.id&&["done","delivered"].includes(o.status)&&o.budget).reduce((acc,o)=>acc+(parseFloat(o.budget)||0),0);
    const avg=avgDelayDays(f.id);
    const lvlColor=f.specialty==="Niveau 1"||f.specialty==="Level 1"?"var(--blue)":f.specialty==="Niveau 2"||f.specialty==="Level 2"?"var(--purple)":"var(--accent)";

      <div class="card-b">
        <div style="display:flex;align-items:center;gap:12px;margin-bottom:14px">

            <div style="font-weight:800;font-size:15px">${f.name}</div>
            <div style="font-size:11px;color:var(--muted)">${f.email}</div>
            ${f.phone?`<div style="font-size:10px;color:var(--wa);margin-top:2px">📲 ${f.phone}</div>`:""}
          </div><span class="pill" style="background:${lvlColor}18;color:${lvlColor};border:1px solid ${lvlColor}33">${f.specialty}</span>
        </div>
        <div style="display:grid;grid-template-columns:repeat(5,1fr);gap:6px;margin-bottom:12px">
          <div style="background:var(--bg);border-radius:8px;padding:8px 6px;text-align:center"><div style="font-size:18px;font-weight:900;color:var(--blue)">${cO}</div><div style="font-size:8px;color:var(--muted)">En cours</div></div>
          <div style="background:var(--bg);border-radius:8px;padding:8px 6px;text-align:center"><div style="font-size:18px;font-weight:900;color:var(--teal)">${cRV}</div><div style="font-size:8px;color:var(--muted)">Révisions</div></div>
          <div style="background:var(--bg);border-radius:8px;padding:8px 6px;text-align:center"><div style="font-size:18px;font-weight:900;color:var(--green)">${doneO+doneRV}</div><div style="font-size:8px;color:var(--muted)">Livrées</div></div>
          <div style="background:var(--bg);border-radius:8px;padding:8px 6px;text-align:center"><div style="font-size:14px;font-weight:900;color:var(--accent)">${totalBudget>0?totalBudget+"€":"—"}</div><div style="font-size:8px;color:var(--muted)">CA</div></div>
          <div style="background:var(--bg);border-radius:8px;padding:8px 6px;text-align:center"><div style="font-size:14px;font-weight:900;color:var(--orange)">${avg!==null?avg+"j":"—"}</div><div style="font-size:8px;color:var(--muted)">Délai moy.</div></div>
        </div>
        <div style="display:flex;gap:7px;flex-wrap:wrap">
          <button class="btn btn-sm btn-ghost" onclick="openFlSheet('${f.id}')">✏️ ${tr.edit}</button>

async function toggleFl(id,active){
  const f=S.freelancers.find(x=>x.id===id);
  try{const u=await api("PUT",`/freelancers/${id}`,{...f,active:active==="true"?false:true});S.freelancers=S.freelancers.map(x=>x.id===id?u:x);renderFL();}
  catch(e){alert("Erreur");}
}
async function delFl(id){
  if(!confirm("Supprimer ?"))return;
  try{await api("DELETE",`/freelancers/${id}`);S.freelancers=S.freelancers.filter(f=>f.id!==id);renderFL();}
  catch(e){alert("Erreur");}
}
function openFlSheet(id){
  const tr=t(); const f=id?S.freelancers.find(x=>x.id===id):null;
  openSheet(f?tr.editFl:tr.newFl,`
    <div class="field"><label class="lbl">${tr.fullName}</label><input class="inp" id="ff-n" value="${f?.name||""}"/></div>
    <div class="field"><label class="lbl">${tr.email}</label><input class="inp" type="email" id="ff-e" value="${f?.email||""}"/></div>

    <div class="field"><label class="lbl">${tr.spec}</label>
      <select class="inp" id="ff-s">${tr.specs.map(x=>`<option${x===f?.specialty?" selected":""}>${x}</option>`).join("")}</select>
    </div>

      <button class="btn btn-ghost btn-full" onclick="closeSheet()">${tr.cancel}</button>
      <button class="btn btn-p btn-full" id="ff-save" onclick="saveFl('${id||""}')">${f?tr.save:tr.add}</button>

}
async function saveFl(id){
  const n=el("ff-n").value.trim(); if(!n)return;
  const btn=el("ff-save"); btn.textContent="⏳..."; btn.disabled=true;
  const ini=n.split(" ").map(w=>w[0]).join("").slice(0,2).toUpperCase();
  const form={name:n,email:el("ff-e").value,password:el("ff-p").value,phone:el("ff-ph").value,specialty:el("ff-s").value,avatar:ini,active:true};
  try{
    if(id){const u=await api("PUT",`/freelancers/${id}`,{...S.freelancers.find(f=>f.id===id),...form});S.freelancers=S.freelancers.map(f=>f.id===id?u:f);}
    else{const c=await api("POST","/freelancers",{...form,id:uid()});S.freelancers=[...S.freelancers,c];}
    closeSheet(); renderFL();
  }catch(e){showErr("ff-err","Erreur.");btn.textContent=t().save;btn.disabled=false;}
}

// ── BILLING ───────────────────────────────────────────────────────
function renderBilling(){
  const tr=t();
  // Grouper les commandes terminées par mois
  const done=S.orders.filter(o=>["done","delivered"].includes(o.status));
  const byMonth={};
  done.forEach(o=>{
    const mk=o.createdAt?new Date(o.createdAt).toISOString().slice(0,7):"unknown";
    if(!byMonth[mk])byMonth[mk]={orders:[],total:0};
    byMonth[mk].orders.push(o);
    byMonth[mk].total+=(parseFloat(o.budget)||0);
  });
  const months=Object.keys(byMonth).sort((a,b)=>b.localeCompare(a));
  let h=`<div class="screen"><h2 style="font-size:16px;font-weight:900;margin-bottom:16px">💰 ${tr.billingTitle}</h2>`;
  if(!months.length){h+=`<div class="card"><div style="padding:32px;text-align:center;color:var(--muted);font-size:13px">Aucune commande terminée.</div></div>`;h+=`</div>`;el("page").innerHTML=h;return;}
  months.forEach(mk=>{
    const m=byMonth[mk];
    const label=new Date(mk+"-01").toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
    h+=`<div class="billing-month">
      <div class="billing-month-h">
        <span>📅 ${label}</span>
        <span style="color:var(--accent)">${m.total>0?m.total+"€":""} · ${m.orders.length} mission${m.orders.length>1?"s":""}</span>
      </div>`;
    // Par freelance
    const byFl={};
    m.orders.forEach(o=>{
      const fid=o.freelanceId||"unassigned";
      if(!byFl[fid])byFl[fid]=[];
      byFl[fid].push(o);
    });
    Object.entries(byFl).forEach(([fid,orders])=>{
      const fl=S.freelancers.find(f=>f.id===fid);
      const flTotal=orders.reduce((acc,o)=>acc+(parseFloat(o.budget)||0),0);
      h+=`<div style="padding:10px 14px;border-top:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          ${fl?mkAv(fl.avatar,24):mkAv("?",24)}
          <span style="font-weight:700;font-size:13px">${fl?.name||"Non assigné"}</span>
          ${fl?`<span class="pill" style="background:rgba(188,140,255,.1);color:var(--purple);border:1px solid rgba(188,140,255,.25)">${fl.specialty}</span>`:""}
          <span style="margin-left:auto;font-weight:800;color:var(--accent)">${flTotal>0?flTotal+"€":""}</span>
        </div>
        ${orders.map(o=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--bg);border-radius:8px;margin-bottom:4px">
          <div><div style="font-size:12px;font-weight:600">${o.clientName}</div><div style="font-size:10px;color:var(--muted)">${o.projectType||""}</div></div>
          <div style="display:flex;align-items:center;gap:8px">
            ${o.budget?`<span style="font-weight:800;color:var(--accent);font-size:12px">${o.budget}€</span>`:""}
            <span style="font-size:10px;color:var(--muted)">${fmt(o.createdAt)}</span>
          </div>
        </div>`).join("")}
      </div>`;
    });
    h+=`</div>`;
  });
  // Total global
  const grandTotal=done.reduce((acc,o)=>acc+(parseFloat(o.budget)||0),0);
  if(grandTotal>0) h+=`<div style="background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.25);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-top:4px"><span style="font-weight:800">💰 Total global</span><span style="font-size:20px;font-weight:900;color:var(--accent)">${grandTotal}€</span></div>`;
  h+=`</div>`;
  el("page").innerHTML=h;
}
