<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
<title>Openshore — Workspace</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700;9..40,800;9..40,900&display=swap" rel="stylesheet"/>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#07090D;--surface:#0C0F16;--card:#111520;--card-hover:#161B27;
  --border:#1C2333;--border-subtle:#151C2B;
  --accent:#F5A623;--accent-glow:rgba(245,166,35,.15);--accent-dim:rgba(245,166,35,.08);
  --green:#22C55E;--green-dim:rgba(34,197,94,.1);
  --red:#EF4444;--red-dim:rgba(239,68,68,.1);
  --blue:#60A5FA;--blue-dim:rgba(96,165,250,.1);
  --purple:#A78BFA;--purple-dim:rgba(167,139,250,.1);
  --teal:#2DD4BF;--teal-dim:rgba(45,212,191,.1);
  --orange:#FB923C;--orange-dim:rgba(251,146,60,.1);
  --wa:#22C55E;--text:#E2E8F4;--text-2:#94A3B8;--text-3:#475569;--dim:#0F1420;
  --shadow-sm:0 1px 3px rgba(0,0,0,.4),0 1px 2px rgba(0,0,0,.3);
  --shadow-md:0 4px 12px rgba(0,0,0,.5),0 2px 4px rgba(0,0,0,.3);
  --shadow-lg:0 10px 30px rgba(0,0,0,.6),0 4px 10px rgba(0,0,0,.4);
  --shadow-xl:0 20px 60px rgba(0,0,0,.8),0 8px 20px rgba(0,0,0,.5);
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:20px;
}
body.light{
  --bg:#F0F4FB;--surface:#FFFFFF;--card:#FFFFFF;--card-hover:#F8FAFF;
  --border:#DDE3EF;--border-subtle:#EBF0F8;--dim:#EEF2FA;
  --text:#111827;--text-2:#4B5563;--text-3:#9CA3AF;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08),0 1px 2px rgba(0,0,0,.05);
  --shadow-md:0 4px 12px rgba(0,0,0,.1),0 2px 4px rgba(0,0,0,.06);
  --shadow-lg:0 10px 30px rgba(0,0,0,.12),0 4px 10px rgba(0,0,0,.08);
  --shadow-xl:0 20px 60px rgba(0,0,0,.15),0 8px 20px rgba(0,0,0,.1);
}
html,body{height:100%;background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;overflow-x:hidden;font-size:14px;transition:background .25s,color .25s;-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:inherit}
a{color:inherit;text-decoration:none}
::-webkit-scrollbar{width:5px;height:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
::-webkit-scrollbar-thumb:hover{background:var(--text-3)}
#auth{position:fixed;inset:0;z-index:999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;}
#auth::before{content:"";position:absolute;inset:0;background:radial-gradient(ellipse 80% 50% at 50% -10%,rgba(245,166,35,.12),transparent);pointer-events:none;}
#auth.hidden{display:none}
.auth-box{width:100%;max-width:390px;position:relative}
.auth-logo{text-align:center;margin-bottom:36px}
.auth-logo-icon{width:72px;height:72px;background:var(--accent-dim);border:1px solid rgba(245,166,35,.25);border-radius:22px;margin:0 auto 16px;display:flex;align-items:center;justify-content:center;font-size:34px;box-shadow:0 0 40px rgba(245,166,35,.2),0 0 80px rgba(245,166,35,.08);}
.auth-logo h1{font-size:28px;font-weight:900;letter-spacing:-.5px;color:var(--text)}
.auth-logo p{font-size:9px;color:var(--accent);font-weight:700;letter-spacing:3.5px;text-transform:uppercase;margin-top:6px;}
.auth-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:28px;margin-bottom:12px;box-shadow:var(--shadow-lg);}
.auth-card h2{font-size:18px;font-weight:800;margin-bottom:4px;letter-spacing:-.2px}
.auth-card .sub{color:var(--text-2);font-size:12px;margin-bottom:24px;line-height:1.5}
#app{display:none;height:100vh;overflow:hidden}
#app.visible{display:flex}
@media(min-width:900px){
  #app{flex-direction:row}
  #sidebar{display:flex!important;flex-direction:column;width:238px;min-width:238px;background:var(--surface);border-right:1px solid var(--border);height:100vh;flex-shrink:0}
  #topbar,#bottomnav{display:none!important}
  #content{flex:1;overflow-y:auto;height:100vh}
  #page{padding:32px 36px 48px;max-width:960px;margin:0 auto}
}
@media(min-width:600px) and (max-width:899px){
  #app{flex-direction:column}
  #sidebar{display:none!important}
  #topbar,#bottomnav{display:flex!important}
  #content{flex:1;overflow-y:auto}
  #page{padding:24px 24px 96px;max-width:720px;margin:0 auto}
}
@media(max-width:599px){
  #app{flex-direction:column}
  #sidebar{display:none!important}
  #topbar,#bottomnav{display:flex!important}
  #content{flex:1;overflow-y:auto}
  #page{padding:16px 16px 96px}
}
#sidebar{display:none}
.sb-logo{padding:22px 18px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:11px;}
.sb-logo-icon{width:36px;height:36px;background:var(--accent-dim);border:1px solid rgba(245,166,35,.2);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;}
.sb-logo h1{font-size:15px;font-weight:900;line-height:1.1;letter-spacing:-.2px}
.sb-logo p{font-size:8px;color:var(--accent);font-weight:700;letter-spacing:2.5px;text-transform:uppercase;margin-top:2px}
.sb-nav{padding:12px 10px;flex:1;overflow-y:auto}
.sb-btn{width:100%;display:flex;align-items:center;gap:10px;padding:9px 13px;border:none;background:transparent;border-radius:var(--radius-sm);color:var(--text-2);font-size:13px;font-weight:600;cursor:pointer;transition:all .18s;margin-bottom:2px;text-align:left;}
.sb-btn:hover{background:var(--card-hover);color:var(--text)}
.sb-btn.active{background:var(--accent-dim);color:var(--accent);font-weight:800;box-shadow:inset 3px 0 0 var(--accent);}
.sb-btn .si{font-size:16px;width:22px;text-align:center;flex-shrink:0;transition:transform .18s}
.sb-btn:hover .si{transform:scale(1.1)}
.sb-badge{margin-left:auto;background:var(--red);color:#fff;border-radius:20px;padding:2px 7px;font-size:10px;font-weight:900;box-shadow:0 0 8px rgba(239,68,68,.4);}
.sb-footer{padding:12px 10px;border-top:1px solid var(--border);background:var(--dim);}
.sb-user{display:flex;align-items:center;gap:10px;padding:9px 12px;margin-bottom:8px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);}
.sb-langs{display:flex;gap:5px;padding:0 4px;margin-bottom:6px}
#topbar{display:none;align-items:center;justify-content:space-between;padding:0 16px;height:54px;flex-shrink:0;background:rgba(12,15,22,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--border);position:sticky;top:0;z-index:10;}
body.light #topbar{background:rgba(255,255,255,.96)}
.tb-right{display:flex;align-items:center;gap:8px}
#bottomnav{display:none;position:fixed;bottom:0;left:0;right:0;z-index:10;background:rgba(12,15,22,.96);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--border);padding-bottom:env(safe-area-inset-bottom,0px);}
body.light #bottomnav{background:rgba(255,255,255,.96)}
.bn-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:3px;padding:8px 2px;border:none;background:transparent;border-top:2px solid transparent;cursor:pointer;transition:all .18s;}
.bn-btn.active{background:var(--accent-dim);border-top-color:var(--accent);}
.bn-icon{font-size:19px;position:relative}
.bn-badge{position:absolute;top:-4px;right:-8px;background:var(--red);color:#fff;border-radius:20px;width:16px;height:16px;display:flex;align-items:center;justify-content:center;font-size:8px;font-weight:900;box-shadow:0 0 6px rgba(239,68,68,.5);}
.bn-label{font-size:8px;font-weight:700;color:var(--text-2);letter-spacing:.3px;text-transform:uppercase}
.bn-btn.active .bn-label{color:var(--accent)}
.btn{border-radius:var(--radius-sm);font-weight:700;letter-spacing:.2px;white-space:nowrap;cursor:pointer;border:none;transition:all .18s;font-size:13px;padding:10px 18px;display:inline-flex;align-items:center;gap:7px;position:relative;overflow:hidden;}
.btn::after{content:"";position:absolute;inset:0;background:transparent;transition:background .18s;border-radius:inherit;}
.btn:hover::after{background:rgba(255,255,255,.06)}
.btn:active{transform:scale(.97)}
.btn-sm{font-size:11.5px;padding:6px 13px;border-radius:7px}
.btn-xs{font-size:10px;padding:3px 9px;border-radius:6px}
.btn-full{width:100%;justify-content:center}
.btn-p{background:var(--accent);color:#0a0a0a;font-weight:800;box-shadow:0 0 16px rgba(245,166,35,.3);}
.btn-p:hover::after{background:rgba(255,255,255,.12)}
.btn-ghost{background:transparent;color:var(--text-2);border:1px solid var(--border)!important}
.btn-ghost:hover{color:var(--text);border-color:var(--text-3)!important}
.btn-blue{background:var(--blue-dim);color:var(--blue);border:1px solid rgba(96,165,250,.25)!important}
.btn-green{background:var(--green-dim);color:var(--green);border:1px solid rgba(34,197,94,.25)!important}
.btn-red{background:var(--red-dim);color:var(--red);border:1px solid rgba(239,68,68,.25)!important}
.btn-wa{background:var(--green-dim);color:var(--wa);border:1px solid rgba(34,197,94,.25)!important}
.btn-teal{background:var(--teal-dim);color:var(--teal);border:1px solid rgba(45,212,191,.25)!important}
.btn-purple{background:var(--purple-dim);color:var(--purple);border:1px solid rgba(167,139,250,.25)!important}
.btn-orange{background:var(--orange-dim);color:var(--orange);border:1px solid rgba(251,146,60,.25)!important}
.field{display:flex;flex-direction:column;gap:6px}
.lbl{color:var(--text-2);font-size:10.5px;font-weight:800;letter-spacing:.8px;text-transform:uppercase;}
.inp{background:var(--bg);border:1.5px solid var(--border);border-radius:var(--radius-sm);color:var(--text);padding:10px 13px;font-size:13px;outline:none;width:100%;transition:border-color .18s,box-shadow .18s;}
.inp:hover{border-color:var(--text-3)}
.inp:focus{border-color:var(--accent);box-shadow:0 0 0 3px var(--accent-dim);}
.inp::placeholder{color:var(--text-3)}
textarea.inp{resize:vertical;min-height:75px;line-height:1.5}
select.inp{cursor:pointer}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);transition:box-shadow .2s,border-color .2s;}
.card:hover{box-shadow:var(--shadow-md)}
.card-h{padding:14px 18px 12px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;justify-content:space-between;gap:10px;background:linear-gradient(180deg,rgba(255,255,255,.02),transparent);}
.card-b{padding:16px 18px}
.card-f{padding:11px 16px 14px;border-top:1px solid var(--border-subtle);display:flex;gap:7px;flex-wrap:wrap;background:var(--dim);}
.badge{border-radius:6px;padding:3px 9px;font-size:10px;font-weight:700;letter-spacing:.2px;}
.pill{border-radius:20px;padding:3px 10px;font-size:10px;font-weight:700;}
.av{border-radius:50%;display:flex;align-items:center;justify-content:center;font-weight:900;color:#fff;flex-shrink:0;background:linear-gradient(135deg,rgba(245,166,35,.85),rgba(167,139,250,.85));border:2px solid rgba(245,166,35,.2);overflow:hidden;box-shadow:0 0 10px rgba(245,166,35,.15);}
.av img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.alert{border-radius:var(--radius-sm);padding:10px 14px;font-size:12px;font-weight:700;display:flex;align-items:center;gap:8px;}
.alert-e{background:var(--red-dim);border:1px solid rgba(239,68,68,.3);color:var(--red)}
.alert-s{background:var(--green-dim);border:1px solid rgba(34,197,94,.3);color:var(--green)}
.alert-i{background:var(--blue-dim);border:1px solid rgba(96,165,250,.3);color:var(--blue)}
.alert-w{background:var(--accent-dim);border:1px solid rgba(245,166,35,.3);color:var(--accent)}
.stats-grid{display:grid;gap:12px;margin-bottom:20px}
@media(min-width:600px){.stats-grid{grid-template-columns:repeat(4,1fr)}}
@media(max-width:599px){.stats-grid{grid-template-columns:repeat(2,1fr)}}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);padding:16px 14px 14px;position:relative;overflow:hidden;box-shadow:var(--shadow-sm);transition:transform .18s,box-shadow .18s;}
.stat:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.stat::before{content:"";position:absolute;top:0;left:0;right:0;height:3px;background:currentColor;opacity:.5;}
.stat-ico{position:absolute;top:12px;right:14px;font-size:22px;opacity:.12;}
.stat-val{font-size:28px;font-weight:900;line-height:1;letter-spacing:-1px}
.stat-lbl{color:var(--text-2);font-size:10.5px;margin-top:5px;font-weight:700;}
.tools-grid{display:grid;gap:10px}
@media(min-width:700px){.tools-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:500px) and (max-width:699px){.tools-grid{grid-template-columns:repeat(2,1fr)}}
@media(max-width:499px){.tools-grid{grid-template-columns:1fr 1fr}}
.tool-card{display:flex;align-items:center;gap:12px;padding:14px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);cursor:pointer;transition:all .18s;box-shadow:var(--shadow-sm);}
.tool-card:hover{border-color:var(--accent);transform:translateY(-2px);box-shadow:var(--shadow-md),0 0 20px var(--accent-dim);}
.tool-ico{width:38px;height:38px;background:var(--accent-dim);border:1px solid rgba(245,166,35,.2);border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;}
.filters{display:flex;gap:6px;overflow-x:auto;padding-bottom:4px;padding-top:2px;-webkit-overflow-scrolling:touch;margin-bottom:14px;}
.filters::-webkit-scrollbar{display:none}
.fbtn{background:var(--card);color:var(--text-2);border:1.5px solid var(--border);border-radius:20px;padding:5px 14px;font-size:10.5px;font-weight:700;white-space:nowrap;flex-shrink:0;cursor:pointer;transition:all .18s;box-shadow:var(--shadow-sm);}
.fbtn:hover{background:var(--card-hover);color:var(--text);border-color:var(--text-3)}
.fbtn.active{background:var(--accent);color:#0a0a0a;border-color:var(--accent);box-shadow:0 0 12px rgba(245,166,35,.3);font-weight:800;}
.two-col{display:grid;gap:12px}
@media(min-width:480px){.two-col{grid-template-columns:1fr 1fr}}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);backdrop-filter:blur(4px);-webkit-backdrop-filter:blur(4px);z-index:200;display:flex;align-items:flex-end;justify-content:center;animation:fadein .2s;}
@media(min-width:600px){.overlay{align-items:center}}
@keyframes fadein{from{opacity:0}to{opacity:1}}
.sheet{background:var(--card);border:1px solid var(--border);width:100%;max-width:580px;max-height:92vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:slideup .25s cubic-bezier(.16,1,.3,1);border-radius:var(--radius-xl) var(--radius-xl) 0 0;}
@media(min-width:600px){.sheet{border-radius:var(--radius-xl);margin:20px}}
@keyframes slideup{from{transform:translateY(40px);opacity:0}to{transform:none;opacity:1}}
.sheet-handle{display:flex;justify-content:center;padding:14px 0 0}
.sheet-handle-bar{width:44px;height:4px;background:var(--border);border-radius:3px}
@media(min-width:600px){.sheet-handle{display:none}}
.sheet-head{display:flex;align-items:center;justify-content:space-between;padding:14px 22px 0;}
.sheet-body{padding:18px 22px 40px;display:flex;flex-direction:column;gap:14px}
.sheet-x{background:var(--dim);border:1px solid var(--border);color:var(--text-2);font-size:18px;line-height:1;cursor:pointer;padding:7px;border-radius:8px;transition:all .15s;}
.sheet-x:hover{background:var(--card-hover);color:var(--text)}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px);z-index:1000;display:flex;align-items:center;justify-content:center;padding:20px;animation:fadein .2s;}
.modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-xl);padding:30px;width:100%;max-width:380px;box-shadow:var(--shadow-xl);animation:popIn .22s cubic-bezier(.16,1,.3,1);}
@keyframes popIn{from{opacity:0;transform:scale(.94) translateY(12px)}to{opacity:1;transform:none}}
.detail-modal{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-xl);width:100%;max-width:640px;max-height:88vh;overflow-y:auto;box-shadow:var(--shadow-xl);animation:detailIn .25s cubic-bezier(.16,1,.3,1);}
@keyframes detailIn{from{opacity:0;transform:scale(.93) translateY(18px)}to{opacity:1;transform:none}}
.detail-header{padding:22px 26px 18px;border-bottom:1px solid var(--border);display:flex;align-items:flex-start;justify-content:space-between;gap:14px;background:linear-gradient(180deg,rgba(255,255,255,.025),transparent);}
.detail-header-info h2{font-size:19px;font-weight:900;line-height:1.2;letter-spacing:-.3px}
.detail-close{background:var(--dim);border:1px solid var(--border);color:var(--text-2);font-size:20px;cursor:pointer;padding:8px;border-radius:9px;line-height:1;transition:all .15s;flex-shrink:0;}
.detail-close:hover{background:var(--card-hover);color:var(--text)}
.detail-body{padding:22px 26px 26px}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:16px 22px;margin-bottom:20px}
@media(max-width:500px){.detail-grid{grid-template-columns:1fr}}
.detail-field .detail-label{font-size:10px;font-weight:800;text-transform:uppercase;letter-spacing:.9px;color:var(--text-2);margin-bottom:5px;}
.detail-field .detail-value{font-size:13px;font-weight:600;color:var(--text);line-height:1.5;word-break:break-word;}
.detail-field.full{grid-column:1/-1}
.detail-divider{height:1px;background:var(--border);margin:4px 0 16px;grid-column:1/-1;}
.detail-desc{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-md);padding:14px 16px;font-size:13px;line-height:1.7;color:var(--text);white-space:pre-wrap;word-break:break-word;max-height:300px;overflow-y:auto;}
.detail-actions{display:flex;gap:8px;flex-wrap:wrap;padding:14px 26px 22px;border-top:1px solid var(--border);background:var(--dim);}
.search-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);backdrop-filter:blur(8px);-webkit-backdrop-filter:blur(8px);z-index:300;display:flex;flex-direction:column;align-items:center;padding:56px 20px 20px;animation:fadein .15s;}
.search-box{width:100%;max-width:580px;background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-xl);animation:slidedown .2s cubic-bezier(.16,1,.3,1);}
@keyframes slidedown{from{opacity:0;transform:translateY(-16px)}to{opacity:1;transform:none}}
.search-inp{background:transparent;border:none;color:var(--text);padding:17px 22px;font-size:16px;outline:none;width:100%;font-weight:600;}
.search-inp::placeholder{color:var(--text-3)}
.search-results{max-height:420px;overflow-y:auto}
.search-res-item{display:flex;align-items:center;gap:11px;padding:12px 18px;border-top:1px solid var(--border-subtle);cursor:pointer;transition:background .1s;}
.search-res-item:hover{background:var(--card-hover)}
.search-section{padding:7px 18px;font-size:9px;font-weight:800;text-transform:uppercase;letter-spacing:1.5px;color:var(--text-3);background:var(--dim);border-top:1px solid var(--border-subtle);}
.stale-item{display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border-subtle);transition:background .15s;}
.stale-item:hover{background:var(--card-hover)}
.stale-dot{width:8px;height:8px;border-radius:50%;background:var(--orange);flex-shrink:0;animation:pulse 2s ease-in-out infinite;box-shadow:0 0 6px rgba(251,146,60,.5);}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.85)}}
.section-title{font-size:10.5px;font-weight:800;color:var(--text-3);text-transform:uppercase;letter-spacing:1.5px;margin:18px 0 11px;}
.screen{animation:pagein .2s ease}
@keyframes pagein{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:none}}
.spinner{display:flex;align-items:center;justify-content:center;padding:72px;flex-direction:column;gap:16px;}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin .75s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
.kanban-wrap{display:flex;gap:12px;overflow-x:auto;padding-bottom:20px;align-items:flex-start;-webkit-overflow-scrolling:touch;}
.kanban-wrap::-webkit-scrollbar{height:5px}
.kanban-col{flex-shrink:0;width:252px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-lg);overflow:hidden;box-shadow:var(--shadow-sm);}
.kanban-col-h{padding:11px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;background:linear-gradient(180deg,rgba(255,255,255,.025),transparent);}
.kanban-col-body{padding:9px;min-height:60px;max-height:70vh;overflow-y:auto}
.kanban-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-sm);padding:11px 13px;margin-bottom:9px;cursor:pointer;transition:all .18s;box-shadow:var(--shadow-sm);}
.kanban-card:hover{border-color:var(--accent);box-shadow:var(--shadow-md),0 0 16px var(--accent-dim);transform:translateY(-1px);}
.rv-tag{display:inline-flex;align-items:center;gap:4px;background:var(--teal-dim);border:1px solid rgba(45,212,191,.2);border-radius:6px;padding:3px 9px;font-size:10px;font-weight:700;color:var(--teal);margin:2px 2px 2px 0;}
.cmt-item{display:flex;gap:9px;margin-bottom:12px}
.cmt-bubble{background:var(--bg);border:1px solid var(--border);border-radius:var(--radius-sm);padding:9px 11px;flex:1;line-height:1.5;}
.cmt-admin{background:rgba(245,166,35,.05);border-color:rgba(245,166,35,.18)}
.cmt-fl{background:rgba(167,139,250,.05);border-color:rgba(167,139,250,.18)}
.tl-item{display:flex;gap:11px;align-items:flex-start;margin-bottom:12px;position:relative}
.tl-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;margin-top:4px;border:2px solid var(--bg);box-shadow:0 0 6px currentColor;}
.tl-line{position:absolute;left:4px;top:14px;bottom:-12px;width:2px;background:var(--border);border-radius:1px}
.delivery-badge{display:inline-flex;align-items:center;gap:7px;background:var(--green-dim);border:1px solid rgba(34,197,94,.25);border-radius:9px;padding:6px 12px;font-size:11.5px;font-weight:700;color:var(--green);}
.billing-month{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-md);margin-bottom:12px;overflow:hidden;box-shadow:var(--shadow-sm);}
.billing-month-h{padding:13px 16px;background:linear-gradient(135deg,var(--dim),var(--surface));display:flex;align-items:center;justify-content:space-between;font-weight:800;font-size:13px;border-bottom:1px solid var(--border);}
.client-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius-lg);margin-bottom:14px;overflow:hidden;box-shadow:var(--shadow-sm);transition:box-shadow .2s;}
.client-card:hover{box-shadow:var(--shadow-md)}
.client-card-h{padding:14px 18px;border-bottom:1px solid var(--border-subtle);display:flex;align-items:center;gap:13px;background:linear-gradient(180deg,rgba(255,255,255,.02),transparent);}
.kbd{display:inline-block;background:var(--dim);border:1px solid var(--border);border-bottom-width:2px;border-radius:5px;padding:1px 7px;font-size:9.5px;font-weight:700;font-family:monospace;color:var(--text-2);}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:4px;}
</style>
</head>

// ── HELPERS ──────────────────────────────────────────────────────
const el = id => document.getElementById(id);
function uid(){ return Math.random().toString(36).slice(2,9) }
function d7(){ return new Date(Date.now()+7*864e5).toISOString().slice(0,10) }
function fmt(iso){ return iso ? new Date(iso).toLocaleDateString("fr-FR",{day:"2-digit",month:"short"}) : "—" }
function fmtFull(iso){ return iso ? new Date(iso).toLocaleString("fr-FR",{day:"2-digit",month:"short",hour:"2-digit",minute:"2-digit"}) : "—" }
function showErr(id,msg){ const e=el(id); if(!e)return; e.textContent=msg; e.style.display="block"; setTimeout(()=>e.style.display="none",3500) }
function togglePw(id,btn){ const i=el(id); i.type=i.type==="password"?"text":"password"; btn.textContent=i.type==="password"?"👁":"🙈" }
function mkAv(fl, sz=36){
  if(fl?.avatarUrl) return `<div class="av" style="width:${sz}px;height:${sz}px"><img src="${fl.avatarUrl}" onerror="this.parentNode.innerHTML='${(fl.avatar||"?").replace(/'/g,"")}'"/></div>`;
  const ini = typeof fl==="string" ? fl : (fl?.avatar||"?");
  return `<div class="av" style="width:${sz}px;height:${sz}px;font-size:${sz*.33}px">${ini}</div>`;
}
function mkBadge(sk,map){ const c=STATUS_COLORS[sk]||"#58A6FF"; return `<span class="badge" style="background:${c}20;color:${c};border:1px solid ${c}40">${(map||t().sl)[sk]||sk}</span>` }
function mkPill(lbl,c="#F0A500"){ return `<span class="pill" style="background:${c}18;color:${c};border:1px solid ${c}33">${lbl}</span>` }
function deadlineRv(iso){
  if(!iso)return"";
  const ms=new Date(iso)-Date.now(), h=Math.floor(ms/3600000), m=Math.floor((ms%3600000)/60000);
  if(ms<=0) return `<span style="color:var(--red);font-weight:800">⚠️ Dépassée</span>`;
  if(h<2)   return `<span style="color:var(--red);font-weight:800">🔴 ${h}h${String(m).padStart(2,"0")} restantes</span>`;
  if(h<6)   return `<span style="color:var(--accent);font-weight:700">🟠 ${h}h${String(m).padStart(2,"0")} restantes</span>`;
  return `<span style="color:var(--muted)">⏱ ${fmtFull(iso)}</span>`;
}
function deadlineOrder(iso){
  if(!iso)return"";
  const d=Math.ceil((new Date(iso)-Date.now())/864e5);
  const c=d<=0?"var(--red)":d<=2?"var(--accent)":"var(--muted)";
  return `<span style="font-size:11px;color:${c};font-weight:${d<=2?"700":"400"}">⏱ ${fmt(iso)} (${d<=0?"Dépassé":"J-"+d})</span>`;
}
function rvTypeTags(rv){
  let tags="";
  if(rv.revisionAspect)  tags+=`<span class="rv-tag">🎨 Aspect</span>`;
  if(rv.revisionContent) tags+=`<span class="rv-tag">📄 Contenu</span>`;
  if(rv.revisionText)    tags+=`<span class="rv-tag">✍️ Texte</span>`;
  if(rv.revisionOther)   tags+=`<span class="rv-tag">💬 Autre</span>`;
  return tags?`<div style="margin-bottom:8px">${tags}</div>`:"";
}
function showLoading(){ el("page").innerHTML=`<div class="spinner"><div class="spin"></div><div style="color:var(--muted);font-size:13px">${t().loading}</div></div>` }

// Stale orders: assigned >5 days no status change
function getStaleOrders(){
  return S.orders.filter(o=>{
    if(!["assigned","inprogress"].includes(o.status)) return false;
    const age=(Date.now()-new Date(o.createdAt))/864e5;
    return age>STALE_DAYS;
  });
}

function avgDelayDays(fid){
  const doneO=S.orders.filter(o=>o.freelanceId===fid&&["done","delivered"].includes(o.status));
  if(!doneO.length) return null;
  // Approximate: use createdAt vs now for done orders (real calc would need history)
  const total=doneO.reduce((acc,o)=>acc+7,0); // default estimate
  return Math.round(total/doneO.length);
}

function updateLogos(theme){
  const src = theme==="light" ? LOGO_NOIR : LOGO_BLANC;
  ["logo-sb","logo-auth","logo-tb"].forEach(id=>{
    const el2=document.getElementById(id);
    if(el2) el2.src=src;
  });
}
function toggleTheme(){
  S.theme=S.theme==="dark"?"light":"dark";
  document.body.classList.toggle("light",S.theme==="light"); updateLogos(S.theme);
  const ico=S.theme==="light"?"☀️":"🌙";
  if(el("theme-btn"))el("theme-btn").textContent=ico;
  if(el("theme-btn-tb"))el("theme-btn-tb").textContent=ico;
  localStorage.setItem("theme",S.theme);
}
function initTheme(){
  const saved=localStorage.getItem("theme")||"dark";
  S.theme=saved; document.body.classList.toggle("light",saved==="light");
  const ico=saved==="light"?"☀️":"🌙";
  setTimeout(()=>{ if(el("theme-btn"))el("theme-btn").textContent=ico; if(el("theme-btn-tb"))el("theme-btn-tb").textContent=ico; updateLogos(saved); },100);
}

// ── API ───────────────────────────────────────────────────────────
async function api(method,path,body){
  const opts={method,headers:{"Content-Type":"application/json"}};
  if(body) opts.body=JSON.stringify(body);
  const res=await fetch(API+path,opts);
  if(!res.ok) throw new Error(`HTTP ${res.status}`);
  return res.json();
}
async function loadAll(){
  showLoading();
  try {
    const [orders,freelancers,tools,revisions]=await Promise.all([
      api("GET","/orders"), api("GET","/freelancers"),
      api("GET","/tools"),  api("GET","/revisions"),
    ]);
    S.orders=orders; S.freelancers=freelancers; S.tools=tools; S.revisions=revisions;
  } catch(e){ console.error("loadAll:",e); }
}
async function syncData(){
  if(!S.role)return;
  try {
    const [orders,revisions]=await Promise.all([api("GET","/orders"),api("GET","/revisions")]);
    S.orders=orders; S.revisions=revisions;
    buildNav(); renderPage();
  } catch(e){}
}

// ── AUTH ──────────────────────────────────────────────────────────
function setLang(l){
  S.lang=l;
  ["al","sl","tl"].forEach(p=>{
    const fr=el(`${p}-fr`),en=el(`${p}-en`);
    if(!fr||!en)return;
    if(l==="fr"){fr.className="btn btn-sm btn-p";en.className="btn btn-sm btn-ghost";}
    else{en.className="btn btn-sm btn-p";fr.className="btn btn-sm btn-ghost";}
  });
  updateAuthUI();
  if(S.role) renderApp();
}
function updateAuthUI(){
  const tr=t();
  el("a-title").textContent=tr.login; el("a-sub").textContent=tr.loginSub;
  el("a-el").textContent=tr.emailL; el("a-pl").textContent=tr.pwL;
  el("a-btn").textContent=tr.loginBtn; el("a-admin-lbl").textContent=tr.adminBtn;
  el("am-title").textContent=tr.adminTitle; el("am-sub").textContent=tr.adminSub;
  el("am-btn").textContent=tr.loginBtn; el("am-cancel").textContent=tr.cancel;
}
async function tryLogin(){
  const email=el("a-email").value.trim(), pw=el("a-pw").value;
  if(!email||!pw) return;
  el("a-btn").textContent="⏳..."; el("a-btn").disabled=true;
  try {
    const res=await fetch(API+"/auth/login",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({email,password:pw})});
    if(!res.ok){ showErr("a-err",t().wrongPw); }
    else { const fl=await res.json(); doLogin("freelancer",fl); }
  } catch(e){ showErr("a-err","Erreur de connexion."); }
  el("a-btn").textContent=t().loginBtn; el("a-btn").disabled=false;
}
function openAdminModal(){ el("admin-modal").style.display="flex"; el("am-pw").value=""; }
async function tryAdmin(){
  const pw=el("am-pw").value; if(!pw) return;
  el("am-btn").textContent="⏳..."; el("am-btn").disabled=true;
  try {
    const res=await fetch(API+"/auth/admin",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({password:pw})});
    if(res.ok){ el("admin-modal").style.display="none"; doLogin("admin",null); }
    else showErr("am-err",t().wrongAdmin);
  } catch(e){ showErr("am-err","Erreur de connexion."); }
  el("am-btn").textContent=t().loginBtn; el("am-btn").disabled=false;
}
async function doLogin(role,me){
  S.role=role; S.me=me; S.tab="dashboard";
  el("auth").classList.add("hidden");
  el("app").classList.add("visible");
  await loadAll();
  buildNav(); renderPage();
  S.syncTimer=setInterval(syncData,10000);
  document.addEventListener("visibilitychange",()=>{ if(!document.hidden) syncData(); });
}
function logout(){
  S.role=null; S.me=null;
  if(S.syncTimer)clearInterval(S.syncTimer);
  el("app").classList.remove("visible");
  el("auth").classList.remove("hidden");
  el("a-email").value=""; el("a-pw").value="";
}

// ── NAV ───────────────────────────────────────────────────────────
const ADM_TABS=[{k:"dashboard",i:"📊"},{k:"orders",i:"📋"},{k:"revisions",i:"🔁"},{k:"clients",i:"👤"},{k:"freelancers",i:"👥"},{k:"billing",i:"💰"},{k:"tools",i:"🧰"},{k:"typeform",i:"🔗"}];
const FL_TABS =[{k:"dashboard",i:"📊"},{k:"orders",i:"📋"},{k:"revisions",i:"🔁"},{k:"tools",i:"🧰"}];

function buildNav(){
  const tabs=S.role==="admin"?ADM_TABS:FL_TABS;
  const newO =S.role==="admin"?S.orders.filter(o=>o.status==="new").length:S.orders.filter(o=>o.freelanceId===S.me?.id&&o.status==="assigned").length;
  const newRV=S.role==="admin"?S.revisions.filter(r=>r.status==="new").length:S.revisions.filter(r=>r.freelanceId===S.me?.id&&r.status==="assigned").length;
  const stale=getStaleOrders().length;
  const tr=t();
  el("sb-nav").innerHTML=tabs.map(tb=>`
    <button class="sb-btn${S.tab===tb.k?" active":""}" onclick="goTab('${tb.k}')">
      <span class="si">${tb.i}</span>${tr[tb.k]||tb.k}
      ${tb.k==="orders"&&newO>0?`<span class="sb-badge">${newO}</span>`:""}
      ${tb.k==="orders"&&stale>0&&S.role==="admin"?`<span style="margin-left:auto;font-size:9px;color:var(--orange)">⏰${stale}</span>`:""}
      ${tb.k==="revisions"&&newRV>0?`<span class="sb-badge">${newRV}</span>`:""}
    </button>`).join("");
  if(el("sb-search-lbl"))el("sb-search-lbl").textContent=tr.searchGlobal;
  if(el("sb-logout"))el("sb-logout").textContent=tr.logout;
  const me=S.me;
  el("sb-user").innerHTML=me
    ?`${mkAv(me,32)}<div><div style="font-size:12px;font-weight:700">${me.name}</div><div style="font-size:10px;color:var(--muted)">${me.specialty}</div></div>`
    :`<div style="font-weight:800;color:var(--accent)">⚡ Admin</div>`;
  el("tb-role").innerHTML=mkPill(S.role==="admin"?tr.admin:(me?me.name.split(" ")[0]:tr.freelancer),S.role==="admin"?"#F0A500":"#BC8CFF");
  const mTabs=S.role==="admin"?[{k:"dashboard",i:"📊"},{k:"orders",i:"📋"},{k:"revisions",i:"🔁"},{k:"clients",i:"👤"},{k:"tools",i:"🧰"}]:FL_TABS;
  el("bottomnav").innerHTML=mTabs.map(tb=>`
    <button class="bn-btn${S.tab===tb.k?" active":""}" onclick="goTab('${tb.k}')">
      <div class="bn-icon">${tb.i}
        ${tb.k==="orders"&&newO>0?`<div class="bn-badge">${newO}</div>`:""}
        ${tb.k==="revisions"&&newRV>0?`<div class="bn-badge">${newRV}</div>`:""}
      </div>
      <span class="bn-label">${(tr[tb.k]||tb.k).slice(0,7)}</span>
    </button>`).join("");
}
function goTab(k){ S.tab=k; buildNav(); renderPage(); el("content").scrollTo(0,0); }
function renderApp(){ buildNav(); renderPage(); }
function renderPage(){
  const k=S.tab;
  if(k==="dashboard")   renderDash();
  else if(k==="orders") renderOrders();
  else if(k==="revisions") renderRevisions();
  else if(k==="clients") renderClients();
  else if(k==="freelancers"&&S.role==="admin") renderFL();
  else if(k==="billing"&&S.role==="admin") renderBilling();
  else if(k==="tools")  renderTools();
  else if(k==="typeform"&&S.role==="admin") renderTF();
}

// ── KEYBOARD SHORTCUTS ────────────────────────────────────────────
document.addEventListener("keydown", e=>{
  if(!S.role) return;
  if(e.target.tagName==="INPUT"||e.target.tagName==="TEXTAREA") return;
  const tabs=S.role==="admin"?ADM_TABS:FL_TABS;
  if(e.key==="Escape"){ closeDetail(); closeSheet(); closeSearch(); return; }
  if((e.metaKey||e.ctrlKey)&&e.key==="k"){ e.preventDefault(); openSearch(); return; }
  if(e.key==="k"&&!e.metaKey&&!e.ctrlKey){ openSearch(); return; }
  const idx=parseInt(e.key)-1;
  if(idx>=0&&idx<tabs.length){ goTab(tabs[idx].k); }
});

// ── GLOBAL SEARCH ─────────────────────────────────────────────────
let searchTimer=null;
function openSearch(){
  el("search-overlay").style.display="block";
  setTimeout(()=>{ if(el("search-inp"))el("search-inp").focus(); },50);
}
function closeSearch(){ el("search-overlay").style.display="none"; }
async function doSearch(q){
  clearTimeout(searchTimer);
  const r=el("search-results"); if(!r)return;
  if(!q||q.length<2){ r.innerHTML=""; return; }
  r.innerHTML=`<div style="padding:12px 16px;color:var(--muted);font-size:12px">Recherche…</div>`;
  searchTimer=setTimeout(async()=>{
    try{
      const res=await api("GET",`/search?q=${encodeURIComponent(q)}`);
      let h="";
      if(res.orders?.length){
        h+=`<div class="search-section">📋 Commandes</div>`;
        res.orders.forEach(o=>{
          const fl=S.freelancers.find(f=>f.id===o.freelanceId);
          h+=`<div class="search-res-item" onclick="closeSearch();S.tab='orders';S.oSearch='${o.clientName.replace(/'/g,"")}';renderOrders();buildNav()">
            <div style="flex:1"><div style="font-weight:700;font-size:12px">${o.clientName}</div><div style="font-size:10px;color:var(--muted)">${o.company||o.projectType||""}</div></div>
            ${mkBadge(o.status,t().sl)}
          </div>`;
        });
      }
      if(res.revisions?.length){
        h+=`<div class="search-section">🔁 Révisions</div>`;
        res.revisions.forEach(r2=>{
          h+=`<div class="search-res-item" onclick="closeSearch();S.tab='revisions';S.rvSearch='${r2.clientName.replace(/'/g,"")}';renderRevisions();buildNav()">
            <div style="flex:1"><div style="font-weight:700;font-size:12px">${r2.clientName}</div><div style="font-size:10px;color:var(--teal)">${r2.projectName||""}</div></div>
            ${mkBadge(r2.status,t().rl)}
          </div>`;
        });
      }
      if(res.freelancers?.length){
        h+=`<div class="search-section">👥 Freelances</div>`;
        res.freelancers.forEach(f=>{
          h+=`<div class="search-res-item" onclick="closeSearch();goTab('freelancers')">
            ${mkAv(f,28)}<div><div style="font-weight:700;font-size:12px">${f.name}</div><div style="font-size:10px;color:var(--muted)">${f.specialty}</div></div>
          </div>`;
        });
      }
      if(!h) h=`<div style="padding:20px;text-align:center;color:var(--muted);font-size:12px">Aucun résultat pour "${q}"</div>`;
      if(r)r.innerHTML=h;
    }catch(e2){ if(r)r.innerHTML=`<div style="padding:12px;color:var(--red);font-size:12px">Erreur.</div>`; }
  },300);
}

// ── DASHBOARD ─────────────────────────────────────────────────────
function renderDash(){
  const tr=t();
  const myO =S.role==="freelancer"?S.orders.filter(o=>o.freelanceId===S.me?.id):S.orders;
  const myRV=S.role==="freelancer"?S.revisions.filter(r=>r.freelanceId===S.me?.id):S.revisions;
  const stats=S.role==="admin"?[
    {l:tr.totalOrders,v:S.orders.length,c:"var(--blue)",i:"📋"},
    {l:tr.totalRevisions,v:S.revisions.length,c:"var(--teal)",i:"🔁"},
    {l:tr.rvOpen,v:S.revisions.filter(r=>!["done","cancelled"].includes(r.status)).length,c:"var(--accent)",i:"⏳"},
    {l:tr.activeFl,v:S.freelancers.filter(f=>f.active).length,c:"var(--purple)",i:"👥"},
  ]:[
    {l:tr.totalOrders,v:myO.length,c:"var(--blue)",i:"📋"},
    {l:tr.totalRevisions,v:myRV.length,c:"var(--teal)",i:"🔁"},
    {l:tr.rvOpen,v:myRV.filter(r=>!["done","cancelled"].includes(r.status)).length,c:"var(--accent)",i:"⏳"},
  ];
  const urgentRV=[...myRV].filter(r=>!["done","cancelled"].includes(r.status)&&r.deadline).sort((a,b)=>new Date(a.deadline)-new Date(b.deadline)).slice(0,4);
  const recentO=[...myO].sort((a,b)=>new Date(b.createdAt)-new Date(a.createdAt)).slice(0,3);
  const stale=S.role==="admin"?getStaleOrders():[];

  let h=`<div class="screen">`;
  if(S.me) h+=`<div style="background:linear-gradient(135deg,rgba(240,165,0,.08),rgba(188,140,255,.08));border:1px solid rgba(240,165,0,.18);border-radius:14px;padding:14px 16px;display:flex;align-items:center;gap:12px;margin-bottom:16px">${mkAv(S.me,42)}<div><div style="font-weight:800;font-size:14px">👋 ${S.me.name}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${S.me.specialty}</div></div></div>`;
  h+=`<div class="stats-grid">${stats.map(s=>`<div class="stat"><div class="stat-ico">${s.i}</div><div class="stat-val" style="color:${s.c}">${s.v}</div><div class="stat-lbl">${s.l}</div></div>`).join("")}</div>`;

  // Alertes relance
  if(stale.length){
    h+=`<div class="card" style="margin-bottom:12px;border-color:rgba(255,152,0,.4)"><div class="card-h"><span style="font-size:13px;font-weight:800;color:var(--orange)">${tr.staleAlert}</span><span style="font-size:11px;color:var(--orange)">${stale.length}</span></div>`;
    stale.forEach(o=>{
      const fl=S.freelancers.find(f=>f.id===o.freelanceId);
      const days=Math.floor((Date.now()-new Date(o.createdAt))/864e5);
      h+=`<div class="stale-item"><div style="display:flex;align-items:center;gap:8px"><div class="stale-dot"></div><div><div style="font-size:12px;font-weight:700">${o.clientName}</div><div style="font-size:10px;color:var(--muted)">${fl?.name||"—"} · ${days}j</div></div></div>${mkBadge(o.status,tr.sl)}</div>`;
    });
    h+=`</div>`;
  }

  // Révisions urgentes
  h+=`<div class="card" style="margin-bottom:12px;border-color:rgba(38,198,218,.25)"><div class="card-h"><span style="font-size:13px;font-weight:800">🔁 ${tr.recentRevisions}</span></div>`;
  if(!urgentRV.length) h+=`<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">✅ Aucune révision urgente</div>`;
  urgentRV.forEach(r=>{
    const ms=r.deadline?new Date(r.deadline)-Date.now():null;
    const bc=ms!==null&&ms<7200000?"rgba(248,81,73,.5)":ms!==null&&ms<21600000?"rgba(240,165,0,.4)":"var(--border)";
    h+=`<div style="padding:11px 16px;border-bottom:1px solid var(--border);border-left:3px solid ${bc}"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:3px"><div style="font-weight:700;font-size:13px">${r.clientName}</div>${mkBadge(r.status,tr.rl)}</div><div style="font-size:11px;color:var(--teal)">${r.projectName||""}</div><div style="font-size:11px;margin-top:2px">${deadlineRv(r.deadline)}</div></div>`;
  });
  h+=`</div>`;

  // Commandes récentes
  h+=`<div class="card" style="margin-bottom:12px"><div class="card-h"><span style="font-size:13px;font-weight:800">📋 ${tr.recentOrders}</span></div>`;
  if(!recentO.length) h+=`<div style="padding:20px;text-align:center;color:var(--muted);font-size:13px">${tr.noOrders}</div>`;
  recentO.forEach(o=>{ h+=`<div style="display:flex;align-items:center;justify-content:space-between;padding:10px 16px;border-bottom:1px solid var(--border);gap:8px"><div style="flex:1;min-width:0"><div style="font-weight:700;font-size:13px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${o.clientName}</div><div style="font-size:10px;color:var(--muted)">${o.projectType||""} · ${fmt(o.createdAt)}</div></div>${mkBadge(o.status,tr.sl)}</div>`; });
  h+=`</div>`;

  // Charge équipe (admin)
  if(S.role==="admin"){
    h+=`<div class="card"><div class="card-h"><span style="font-size:13px;font-weight:800">${tr.flLoad}</span></div>`;
    S.freelancers.filter(f=>f.active).forEach(f=>{
      const cO=S.orders.filter(o=>o.freelanceId===f.id&&!["done","delivered","cancelled"].includes(o.status)).length;
      const cRV=S.revisions.filter(r=>r.freelanceId===f.id&&!["done","cancelled"].includes(r.status)).length;
      const pct=Math.min(100,Math.round((cO+cRV)*20));
      const barC=pct>80?"var(--red)":pct>50?"var(--accent)":"var(--green)";
      h+=`<div style="display:flex;align-items:center;gap:10px;padding:11px 16px;border-bottom:1px solid var(--border)">${mkAv(f,28)}<div style="flex:1"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px"><span style="font-size:12px;font-weight:700">${f.name}</span><span style="font-size:10px;color:var(--muted)">${cO} cmd · ${cRV} rév</span></div><div style="height:4px;background:var(--border);border-radius:2px"><div style="height:4px;background:${barC};border-radius:2px;width:${pct}%;transition:width .3s"></div></div></div></div>`;
    });
    h+=`</div>`;
  }
  h+=`</div>`;
  el("page").innerHTML=h;
}

// ── ORDERS ────────────────────────────────────────────────────────
function renderOrders(){
  const tr=t();
  const pool=S.role==="freelancer"?S.orders.filter(o=>o.freelanceId===S.me?.id):S.orders;
  let list=pool.filter(o=>{
    if(S.oFilter!=="all"&&o.status!==S.oFilter) return false;
    if(S.oFlFilter!=="all"&&o.freelanceId!==S.oFlFilter) return false;
    if(S.oSearch&&!o.clientName?.toLowerCase().includes(S.oSearch.toLowerCase())&&!o.company?.toLowerCase().includes(S.oSearch.toLowerCase())) return false;
    return true;
  });
  let h=`<div class="screen">`;
  h+=`<div style="display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap">
    <input class="inp" style="flex:1;min-width:140px" placeholder="${tr.search}" value="${S.oSearch}" oninput="S.oSearch=this.value;renderOrders()"/>
    <button class="btn btn-ghost btn-sm" onclick="S.oView=S.oView==='list'?'kanban':'list';renderOrders()">${S.oView==="list"?"🔲":"☰"}</button>
    ${S.role==="admin"?`<button class="btn btn-ghost btn-sm" onclick="exportOrdersCsv()">⬇ CSV</button><button class="btn btn-p btn-sm" onclick="openOrderSheet(null)">${tr.addOrder}</button>`:""}
  </div>`;
  // Filtre freelance (admin)
  if(S.role==="admin"){
    h+=`<div class="filters"><button class="fbtn${S.oFlFilter==="all"?" active":""}" onclick="S.oFlFilter='all';renderOrders()">${tr.allFl}</button>`;
    S.freelancers.filter(f=>f.active).forEach(f=>{h+=`<button class="fbtn${S.oFlFilter===f.id?" active":""}" onclick="S.oFlFilter='${f.id}';renderOrders()">${f.name.split(" ")[0]}</button>`;});
    h+=`</div>`;
  }
  h+=`<div class="filters">${["all",...Object.keys(tr.sl)].map(s=>`<button class="fbtn${S.oFilter===s?" active":""}" onclick="S.oFilter='${s}';renderOrders()">${s==="all"?tr.all:tr.sl[s]}</button>`).join("")}</div>`;
  if(S.oView==="kanban"){ h+=renderKanban(list,"order"); }
  else {
    if(!list.length) h+=`<div class="card"><div style="padding:32px;text-align:center;color:var(--muted);font-size:13px">${S.role==="freelancer"?tr.noMissions:tr.noOrders}</div></div>`;
    list.forEach(o=>{ h+=renderOrderCard(o); });
  }
  h+=`</div>`;
  el("page").innerHTML=h;
}
function renderOrderCard(o){
  const tr=t();
  const fl=S.freelancers.find(f=>f.id===o.freelanceId);
  const stale=["assigned","inprogress"].includes(o.status)&&(Date.now()-new Date(o.createdAt))/864e5>STALE_DAYS;
  return `<div class="card" style="margin-bottom:10px${stale?";border-color:rgba(255,152,0,.5)":""}">
    <div class="card-h" style="cursor:pointer" onclick="openOrderDetail('${o.id}')"><div style="flex:1;min-width:0">
      <div style="font-weight:800;font-size:14px">${o.clientName}${stale?` <span style="font-size:9px;color:var(--orange)">⏰ Relance</span>`:""}</div>
      ${o.company?`<div style="font-size:10px;color:var(--accent);font-weight:700">${o.company}</div>`:""}
      <div style="font-size:10px;color:var(--muted)">${[o.clientEmail,o.clientPhone].filter(Boolean).join(" · ")}</div>
    </div>
    <div style="display:flex;align-items:center;gap:5px;flex-shrink:0">
      ${o.source==="typeform"?mkPill("TF","#58A6FF"):""}
      ${o.budget?`<span style="font-weight:900;color:var(--accent)">${o.budget}€</span>`:""}
    </div></div>
    <div class="card-b" style="cursor:pointer" onclick="if(event.target.tagName!=='SELECT'&&!event.target.closest('select')&&!event.target.closest('a'))openOrderDetail('${o.id}')">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px">
        <span style="font-size:11px;color:var(--muted);background:var(--dim);border-radius:5px;padding:2px 8px">${o.projectType||""}</span>
        ${S.role==="admin"
          ?`<select class="inp" style="width:auto;font-size:10px;padding:4px 8px" onclick="event.stopPropagation()" onchange="chgOrderStatus('${o.id}',this.value)">${Object.entries(tr.sl).map(([k,v])=>`<option value="${k}"${k===o.status?" selected":""}>${v}</option>`).join("")}</select>`
          :mkBadge(o.status,tr.sl)}
      </div>
      ${o.description?`<p style="font-size:11px;color:var(--muted);margin-bottom:6px;line-height:1.5">${o.description.slice(0,120)}${o.description.length>120?"…":""}</p>`:""}
      ${o.deliveryUrl?`<a href="${o.deliveryUrl}" target="_blank" onclick="event.stopPropagation()"><div class="delivery-badge" style="margin-bottom:6px">🚀 Livraison disponible</div></a>`:""}
      <div style="display:flex;align-items:center;justify-content:space-between">
        ${fl?`<div style="display:flex;align-items:center;gap:6px">${mkAv(fl,22)}<span style="font-size:11px;font-weight:600">${fl.name}</span></div>`:`<span style="font-size:11px;color:var(--muted);font-style:italic">Non assigné</span>`}
        ${deadlineOrder(o.deadline)}
      </div>
    </div>
    ${S.role==="admin"?`<div class="card-f">
      <button class="btn btn-sm btn-blue" onclick="openAssign('${o.id}','order')">👤 ${tr.assign}</button>
      ${fl&&fl.phone?`<button class="btn btn-sm btn-wa" onclick="sendWA('order','${o.id}')">📲</button>`:""}
      <button class="btn btn-sm btn-ghost" onclick="openOrderSheet('${o.id}')">✏️</button>
      <button class="btn btn-sm btn-purple" onclick="openComments('${o.id}','order','${o.clientName.replace(/'/g,"")}')">💬</button>
      <button class="btn btn-sm btn-orange" onclick="openHistory('${o.id}','order','${o.clientName.replace(/'/g,"")}')">📋</button>
      <button class="btn btn-sm btn-red" onclick="delOrder('${o.id}')">🗑️</button>
    </div>`:`<div class="card-f">
      <button class="btn btn-sm btn-purple" onclick="openComments('${o.id}','order','${o.clientName.replace(/'/g,"")}')">💬 ${tr.comments}</button>
      ${!o.deliveryUrl?`<button class="btn btn-sm btn-green" onclick="openDelivery('${o.id}','order')">🚀 Livrer</button>`:""}
    </div>`}
  </div>`;
}
function renderKanban(items, type){
  const tr=t();
  const statusMap=type==="order"?tr.sl:tr.rl;
  let h=`<div class="kanban-wrap">`;
  Object.entries(statusMap).forEach(([sk,sv])=>{
    const col=items.filter(i=>i.status===sk);
    const c=STATUS_COLORS[sk]||"#58A6FF";
    h+=`<div class="kanban-col"><div class="kanban-col-h">
      <span style="font-size:12px;font-weight:800;color:${c}">${sv}</span>
      <span style="font-size:10px;background:${c}20;color:${c};border-radius:10px;padding:1px 7px;font-weight:800">${col.length}</span>
    </div><div class="kanban-col-body">`;
    col.forEach(item=>{
      const fl=S.freelancers.find(f=>f.id===item.freelanceId);
      const kOnclick=type==="order"?"openOrderDetail('"+item.id+"')":" openRevisionDetail('"+item.id+"')";
      h+=`<div class="kanban-card" style="cursor:pointer" onclick="${kOnclick}">
        <div style="font-weight:700;font-size:12px;margin-bottom:4px">${item.clientName}</div>
        ${type==="order"&&item.budget?`<div style="font-size:10px;color:var(--accent);font-weight:800">${item.budget}€</div>`:""}
        ${type==="revision"&&item.projectName?`<div style="font-size:10px;color:var(--teal)">${item.projectName}</div>`:""}
        <div style="display:flex;align-items:center;justify-content:space-between;margin-top:6px">
          ${fl?`<div style="display:flex;align-items:center;gap:4px">${mkAv(fl,18)}<span style="font-size:9px">${fl.name.split(" ")[0]}</span></div>`:`<span style="font-size:9px;color:var(--muted)">—</span>`}
          <span style="font-size:9px;color:var(--muted)">${fmt(item.createdAt)}</span>
        </div>
      </div>`;
    });
    h+=`</div></div>`;
  });
  h+=`</div>`;
  return h;
}
async function chgOrderStatus(id,status){
  try{const u=await api("PUT",`/orders/${id}`,{status,changedBy:S.me?.name||"Admin"});S.orders=S.orders.map(o=>o.id===id?u:o);renderOrders();buildNav();}
  catch(e){alert("Erreur: "+e.message);}
}
async function delOrder(id){
  if(!confirm("Supprimer ?"))return;
  try{await api("DELETE",`/orders/${id}`);S.orders=S.orders.filter(o=>o.id!==id);renderOrders();buildNav();}
  catch(e){alert("Erreur");}
}
function openOrderSheet(id){
  const tr=t(); const o=id?S.orders.find(x=>x.id===id):null;
  openSheet(o?tr.editOrder:tr.newOrder,`
    <div class="two-col">
      <div class="field"><label class="lbl">${tr.clientN}</label><input class="inp" id="of-n" value="${o?.clientName||""}"/></div>

// ── REVISIONS ─────────────────────────────────────────────────────
function renderRevisions(){
  const tr=t();
  const pool=S.role==="freelancer"?S.revisions.filter(r=>r.freelanceId===S.me?.id):S.revisions;
  let list=pool.filter(r=>{
    if(S.rvFilter!=="all"&&r.status!==S.rvFilter) return false;
    if(S.rvFlFilter!=="all"&&r.freelanceId!==S.rvFlFilter) return false;
    if(S.rvSearch){const q=S.rvSearch.toLowerCase();if(!r.clientName?.toLowerCase().includes(q)&&!r.projectName?.toLowerCase().includes(q))return false;}
    return true;
  });
  list=[...list].sort((a,b)=>{if(!a.deadline&&!b.deadline)return 0;if(!a.deadline)return 1;if(!b.deadline)return -1;return new Date(a.deadline)-new Date(b.deadline);});
  let h=`<div class="screen">`;
  if(S.role==="freelancer") h+=`<div class="alert alert-i" style="margin-bottom:12px">🔁 ${tr.myOnlyRev}</div>`;
  h+=`<div style="display:flex;gap:8px;margin-bottom:8px;align-items:center;flex-wrap:wrap">
    <input class="inp" style="flex:1;min-width:140px" placeholder="${tr.search}" value="${S.rvSearch}" oninput="S.rvSearch=this.value;renderRevisions()"/>
    <button class="btn btn-ghost btn-sm" onclick="S.rvView=S.rvView==='list'?'kanban':'list';renderRevisions()">${S.rvView==="list"?"🔲":"☰"}</button>
    ${S.role==="admin"?`<button class="btn btn-ghost btn-sm" onclick="exportRevisionsCsv()">⬇ CSV</button><button class="btn btn-teal btn-sm" onclick="openRevisionSheet(null)">${tr.addRevision}</button>`:""}
  </div>`;
  if(S.role==="admin"){
    h+=`<div class="filters"><button class="fbtn${S.rvFlFilter==="all"?" active":""}" onclick="S.rvFlFilter='all';renderRevisions()">${tr.allFl}</button>`;
    S.freelancers.filter(f=>f.active).forEach(f=>{h+=`<button class="fbtn${S.rvFlFilter===f.id?" active":""}" onclick="S.rvFlFilter='${f.id}';renderRevisions()">${f.name.split(" ")[0]}</button>`;});
    h+=`</div>`;
  }
  h+=`<div class="filters">${["all",...Object.keys(tr.rl)].map(s=>`<button class="fbtn${S.rvFilter===s?" active":""}" onclick="S.rvFilter='${s}';renderRevisions()">${s==="all"?tr.all:tr.rl[s]}</button>`).join("")}</div>`;
  if(S.rvView==="kanban"){ h+=renderKanban(list,"revision"); }
  else {
    if(!list.length) h+=`<div class="card"><div style="padding:32px;text-align:center;color:var(--muted);font-size:13px">${S.role==="freelancer"?tr.noMissions:tr.noRevisions}</div></div>`;
    list.forEach(r=>{ h+=renderRevisionCard(r); });
  }
  h+=`</div>`;
  el("page").innerHTML=h;
}

        <span style="font-size:9px;background:rgba(88,166,255,.1);color:var(--blue);border-radius:4px;padding:2px 6px">${cO} cmd</span>
        <span style="font-size:9px;background:rgba(38,198,218,.1);color:var(--teal);border-radius:4px;padding:2px 6px">${cRV} rév</span>
      </div>
    </div>`;
  });
  if(item?.freelanceId) h+=`<button class="btn btn-red btn-full" onclick="doAssign('${itemId}','${type}','')">${tr.unassign}</button>`;
  openSheet(`${tr.assignTo} — ${item?.clientName||""}`,h);
}
async function doAssign(itemId,type,fid){
  const isRev=type==="revision";
  const item=isRev?S.revisions.find(x=>x.id===itemId):S.orders.find(x=>x.id===itemId);
  try{
    const updated=await api("PUT",`/${isRev?"revisions":"orders"}/${itemId}`,{...item,freelanceId:fid||null,status:fid?"assigned":"new",changedBy:"admin"});
    if(isRev)S.revisions=S.revisions.map(x=>x.id===itemId?updated:x);
    else S.orders=S.orders.map(x=>x.id===itemId?updated:x);
    closeSheet();
    if(fid){
      const fl=S.freelancers.find(f=>f.id===fid);
      if(fl?.phone){
        const msg=isRev?t().waRevision(fl.name,item.clientName,item.projectName||""):t().waOrder(fl.name,item.clientName,item.projectType||"");
        window.open(`https://wa.me/${fl.phone.replace(/\D/g,"")}?text=${encodeURIComponent(msg)}`,"_blank");
      }
    }
    if(isRev)renderRevisions(); else renderOrders();
    buildNav();
  }catch(e){alert("Erreur lors de l'assignation : "+(e.message||e));}
}
function sendWA(type,id){
  const isRev=type==="revision";
  const item=isRev?S.revisions.find(x=>x.id===id):S.orders.find(x=>x.id===id);
  const fl=S.freelancers.find(f=>f.id===item?.freelanceId);
  if(!fl?.phone)return;
  const msg=isRev?t().waRevision(fl.name,item.clientName,item.projectName||""):t().waOrder(fl.name,item.clientName,item.projectType||"");
  window.open(`https://wa.me/${fl.phone.replace(/\D/g,"")}?text=${encodeURIComponent(msg)}`,"_blank");
}

async function postComment(itemId,type){
  const input=el("cmt-input");

async function toggleFl(id,active){
  const f=S.freelancers.find(x=>x.id===id);

  catch(e){alert("Erreur");}
}
async function delFl(id){
  if(!confirm("Supprimer ?"))return;
  try{await api("DELETE",`/freelancers/${id}`);S.freelancers=S.freelancers.filter(f=>f.id!==id);renderFL();}
  catch(e){alert("Erreur");}

function renderBilling(){
  const tr=t();
  const done=S.orders.filter(o=>["done","delivered"].includes(o.status));
  const byMonth={};
  done.forEach(o=>{
    const mk=o.createdAt?new Date(o.createdAt).toISOString().slice(0,7):"unknown";
    if(!byMonth[mk])byMonth[mk]={orders:[],total:0};
    byMonth[mk].orders.push(o);
    byMonth[mk].total+=(parseFloat(o.budget)||0);
  });
  const months=Object.keys(byMonth).sort((a,b)=>b.localeCompare(a));
  let h=`<div class="screen"><div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:16px">
    <h2 style="font-size:16px;font-weight:900">💰 ${tr.billingTitle}</h2>
    <button class="btn btn-ghost btn-sm" onclick="exportOrdersCsv()">⬇ ${tr.exportCsv}</button>
  </div>`;
  if(!months.length){h+=`<div class="card"><div style="padding:32px;text-align:center;color:var(--muted)">Aucune commande terminée.</div></div>`;h+=`</div>`;el("page").innerHTML=h;return;}
  months.forEach(mk=>{
    const m=byMonth[mk];
    const label=new Date(mk+"-01").toLocaleDateString("fr-FR",{month:"long",year:"numeric"});
    h+=`<div class="billing-month"><div class="billing-month-h"><span>📅 ${label}</span><span style="color:var(--accent)">${m.total>0?m.total+"€ · ":""}${m.orders.length} mission${m.orders.length>1?"s":""}</span></div>`;
    const byFl={};
    m.orders.forEach(o=>{ const fid=o.freelanceId||"unassigned"; if(!byFl[fid])byFl[fid]=[]; byFl[fid].push(o); });
    Object.entries(byFl).forEach(([fid,orders])=>{
      const fl=S.freelancers.find(f=>f.id===fid);
      const flTotal=orders.reduce((acc,o)=>acc+(parseFloat(o.budget)||0),0);
      h+=`<div style="padding:10px 14px;border-top:1px solid var(--border)">
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:8px">
          ${fl?mkAv(fl,24):mkAv("?",24)}
          <span style="font-weight:700;font-size:13px">${fl?.name||"Non assigné"}</span>
          ${fl?`<span class="pill" style="background:rgba(188,140,255,.1);color:var(--purple);border:1px solid rgba(188,140,255,.25)">${fl.specialty}</span>`:""}
          <span style="margin-left:auto;font-weight:800;color:var(--accent)">${flTotal>0?flTotal+"€":""}</span>
        </div>
        ${orders.map(o=>`<div style="display:flex;align-items:center;justify-content:space-between;padding:6px 10px;background:var(--bg);border-radius:8px;margin-bottom:4px">
          <div><div style="font-size:12px;font-weight:600">${o.clientName}</div><div style="font-size:10px;color:var(--muted)">${o.projectType||""}</div></div>
          <div style="display:flex;align-items:center;gap:8px">
            ${o.budget?`<span style="font-weight:800;color:var(--accent);font-size:12px">${o.budget}€</span>`:""}
            <span style="font-size:10px;color:var(--muted)">${fmt(o.createdAt)}</span>
          </div>
        </div>`).join("")}
      </div>`;
    });
    h+=`</div>`;
  });
  const grandTotal=done.reduce((acc,o)=>acc+(parseFloat(o.budget)||0),0);
  if(grandTotal>0) h+=`<div style="background:rgba(240,165,0,.08);border:1px solid rgba(240,165,0,.25);border-radius:12px;padding:14px 16px;display:flex;align-items:center;justify-content:space-between;margin-top:4px"><span style="font-weight:800">💰 Total global</span><span style="font-size:20px;font-weight:900;color:var(--accent)">${grandTotal}€</span></div>`;
  h+=`</div>`;
  el("page").innerHTML=h;
}

  const tr=t();
  const fl=S.freelancers.find(f=>f.id===o.freelanceId);
  const stColor=STATUS_COLORS[o.status]||"#58A6FF";
  const stLabel=(tr.sl||{})[o.status]||o.status;
  const dDays=o.deadline?Math.ceil((new Date(o.deadline)-Date.now())/864e5):null;
  const dColor=dDays===null?"var(--muted)":dDays<=0?"var(--red)":dDays<=2?"var(--accent)":"var(--muted)";

  el("detail-wrap").innerHTML=`
    <div class="modal-bg" onclick="if(event.target.classList.contains('modal-bg'))closeDetail()">
      <div class="detail-modal">
        <div class="detail-header">
          <div class="detail-header-info" style="flex:1;min-width:0">
            <h2>${o.clientName}</h2>
            ${o.company?`<div style="font-size:12px;color:var(--accent);font-weight:700;margin-top:2px">${o.company}</div>`:""}
            <div style="display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap">
              <span class="badge" style="background:${stColor}20;color:${stColor};border:1px solid ${stColor}40;font-size:11px">${stLabel}</span>
              ${o.budget?`<span style="font-weight:900;font-size:15px;color:var(--accent)">${o.budget}€</span>`:""}
              ${o.source==="typeform"?mkPill("Typeform","#58A6FF"):""}
            </div>
          </div>
          <button class="detail-close" onclick="closeDetail()">×</button>
        </div>
        <div class="detail-body">
          <div class="detail-grid">
            <div class="detail-field">
              <div class="detail-label">📧 Email</div>
              <div class="detail-value">${o.clientEmail||`<span style="color:var(--muted)">—</span>`}</div>
            </div>
            <div class="detail-field">
              <div class="detail-label">📱 Téléphone</div>
              <div class="detail-value">${o.clientPhone||`<span style="color:var(--muted)">—</span>`}</div>
            </div>
            <div class="detail-field">
              <div class="detail-label">📦 Type de projet</div>
              <div class="detail-value">${o.projectType||`<span style="color:var(--muted)">—</span>`}</div>
            </div>
            <div class="detail-field">
              <div class="detail-label">📅 Deadline</div>
              <div class="detail-value">${o.deadline?`${fmt(o.deadline)} <span style="font-size:11px;color:${dColor};font-weight:700">(J${dDays>0?"-"+dDays:dDays===0?"our J":"+"+Math.abs(dDays)})</span>`:`<span style="color:var(--muted)">—</span>`}</div>
            </div>
            <div class="detail-field">
              <div class="detail-label">👤 Freelance assigné</div>
              <div class="detail-value">${fl?`<div style="display:flex;align-items:center;gap:8px">${mkAv(fl,24)}<span>${fl.name}</span></div>`:`<span style="color:var(--muted);font-style:italic">Non assigné</span>`}</div>
            </div>
            <div class="detail-field">
              <div class="detail-label">🕒 Créé le</div>
              <div class="detail-value">${fmtFull(o.createdAt)}</div>
            </div>
            ${o.deliveryUrl?`<div class="detail-field full">
              <div class="detail-label">🚀 Lien de livraison</div>
              <div class="detail-value"><a href="${o.deliveryUrl}" target="_blank" style="color:var(--green);text-decoration:underline;word-break:break-all">${o.deliveryUrl}</a></div>
            </div>`:""}
            ${o.description?`<div class="detail-field full">
              <div class="detail-label">📝 Description complète</div>
              <div class="detail-desc">${o.description}</div>
            </div>`:""}
          </div>
        </div>
        ${S.role==="admin"?`<div class="detail-actions">
          <button class="btn btn-sm btn-blue" onclick="closeDetail();openAssign('${o.id}','order')">👤 ${tr.assign}</button>
          <button class="btn btn-sm btn-ghost" onclick="closeDetail();openOrderSheet('${o.id}')">✏️ ${tr.edit}</button>
          <button class="btn btn-sm btn-purple" onclick="closeDetail();openComments('${o.id}','order','${o.clientName.replace(/'/g,"")}')">💬 ${tr.comments}</button>
          <button class="btn btn-sm btn-orange" onclick="closeDetail();openHistory('${o.id}','order','${o.clientName.replace(/'/g,"")}')">📋 ${S.lang==="fr"?"Historique":"History"}</button>
          ${fl&&fl.phone?`<button class="btn btn-sm btn-wa" onclick="closeDetail();sendWA('order','${o.id}')">📲 WhatsApp</button>`:""}
        </div>`:""}
      </div>
    </div>`;
}
function closeDetail(){ el("detail-wrap").innerHTML=""; }

function openRevisionDetail(id){
  const r=S.revisions.find(x=>x.id===id); if(!r)return;
  const tr=t();
  const fl=S.freelancers.find(f=>f.id===r.freelanceId);
  const stColor=STATUS_COLORS[r.status]||"#58A6FF";
  const stLabel=(tr.rl||{})[r.status]||r.status;

  el("detail-wrap").innerHTML=`
    <div class="modal-bg" onclick="if(event.target.classList.contains('modal-bg'))closeDetail()">
      <div class="detail-modal">
        <div class="detail-header">
          <div class="detail-header-info" style="flex:1;min-width:0">
            <h2>${r.clientName}</h2>
            ${r.projectName?`<div style="font-size:12px;color:var(--teal);font-weight:700;margin-top:2px">📁 ${r.projectName}</div>`:""}
            <div style="display:flex;align-items:center;gap:8px;margin-top:8px;flex-wrap:wrap">
              <span class="badge" style="background:${stColor}20;color:${stColor};border:1px solid ${stColor}40;font-size:11px">${stLabel}</span>
              ${r.source==="typeform"?mkPill("Typeform","#58A6FF"):""}
            </div>
          </div>
          <button class="detail-close" onclick="closeDetail()">×</button>
        </div>
        <div class="detail-body">
          <div class="detail-grid">
            <div class="detail-field">
              <div class="detail-label">📧 Email</div>
              <div class="detail-value">${r.clientEmail||`<span style="color:var(--muted)">—</span>`}</div>
            </div>
            <div class="detail-field">
              <div class="detail-label">📱 Téléphone</div>
              <div class="detail-value">${r.clientPhone||`<span style="color:var(--muted)">—</span>`}</div>
            </div>
            <div class="detail-field">
              <div class="detail-label">📅 Deadline</div>
              <div class="detail-value">${r.deadline?deadlineRv(r.deadline):`<span style="color:var(--muted)">—</span>`}</div>
            </div>
            <div class="detail-field">
              <div class="detail-label">👤 Freelance assigné</div>
              <div class="detail-value">${fl?`<div style="display:flex;align-items:center;gap:8px">${mkAv(fl,24)}<span>${fl.name}</span></div>`:`<span style="color:var(--muted);font-style:italic">Non assigné</span>`}</div>
            </div>
            <div class="detail-field">
              <div class="detail-label">🕒 Créé le</div>
              <div class="detail-value">${fmtFull(r.createdAt)}</div>
            </div>
            ${r.deliveryUrl?`<div class="detail-field full">
              <div class="detail-label">🚀 Lien de livraison</div>
              <div class="detail-value"><a href="${r.deliveryUrl}" target="_blank" style="color:var(--green);text-decoration:underline;word-break:break-all">${r.deliveryUrl}</a></div>
            </div>`:""}
            <div class="detail-divider"></div>
            ${r.revisionAspect?`<div class="detail-field full">
              <div class="detail-label">🎨 Aspect du site</div>
              <div class="detail-desc">${r.revisionAspect}</div>
            </div>`:""}
            ${r.revisionContent?`<div class="detail-field full">
              <div class="detail-label">📄 Contenu du site</div>
              <div class="detail-desc">${r.revisionContent}</div>
            </div>`:""}
            ${r.revisionText?`<div class="detail-field full">
              <div class="detail-label">✍️ Contenu textuel</div>
              <div class="detail-desc">${r.revisionText}</div>
            </div>`:""}
            ${r.revisionOther?`<div class="detail-field full">
              <div class="detail-label">📝 Autre</div>
              <div class="detail-desc">${r.revisionOther}</div>
            </div>`:""}
          </div>
        </div>
        ${S.role==="admin"?`<div class="detail-actions">
          <button class="btn btn-sm btn-blue" onclick="closeDetail();openAssign('${r.id}','revision')">👤 ${tr.assign}</button>
          <button class="btn btn-sm btn-ghost" onclick="closeDetail();openRevisionSheet('${r.id}')">✏️ ${tr.edit}</button>
          <button class="btn btn-sm btn-purple" onclick="closeDetail();openComments('${r.id}','revision','${r.clientName.replace(/'/g,"")}')">💬 ${tr.comments}</button>
          <button class="btn btn-sm btn-orange" onclick="closeDetail();openHistory('${r.id}','revision','${r.clientName.replace(/'/g,"")}')">📋 ${S.lang==="fr"?"Historique":"History"}</button>
          ${fl&&fl.phone?`<button class="btn btn-sm btn-wa" onclick="closeDetail();sendWA('revision','${r.id}')">📲 WhatsApp</button>`:""}
        </div>`:""}
      </div>
    </div>`;
}

// ── SHEET ─────────────────────────────────────────────────────────
function openSheet(title,body){
  el("sheet-wrap").innerHTML=`
    <div class="overlay" onclick="if(event.target.classList.contains('overlay'))closeSheet()">
      <div class="sheet">
        <div class="sheet-handle"><div class="sheet-handle-bar"></div></div>
        <div class="sheet-head"><h3 style="font-size:15px;font-weight:800">${title}</h3><button class="sheet-x" onclick="closeSheet()">×</button></div>
        <div class="sheet-body">${body}</div>
      </div>
    </div>`;
}
function closeSheet(){ el("sheet-wrap").innerHTML=""; }

// ── INIT ─────────────────────────────────────────────────────────
initTheme();
setLang("fr");
</script>
</body>
</html>
